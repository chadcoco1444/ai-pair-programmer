title: Two Sum
slug: two-sum
difficulty: EASY
category: ALGORITHM
tags: [array, hash-table]
concepts:
  - name: Array
    relevance: 0.8
  - name: Hash Table
    relevance: 1.0
description: |
  給定一個整數陣列 `nums` 和一個整數目標值 `target`，請找出陣列中兩個數字，使它們的和等於目標值，並回傳這兩個數字的 index。

  你可以假設每個輸入只會有一個答案，且不能重複使用同一個元素。

  答案可以以任何順序回傳。

  **範例 1：**
  ```
  輸入：nums = [2,7,11,15], target = 9
  輸出：[0,1]
  解釋：nums[0] + nums[1] = 2 + 7 = 9，所以回傳 [0, 1]。
  ```

  **範例 2：**
  ```
  輸入：nums = [3,2,4], target = 6
  輸出：[1,2]
  ```

  **範例 3：**
  ```
  輸入：nums = [3,3], target = 6
  輸出：[0,1]
  ```

  **限制條件：**
  - `2 <= nums.length <= 10^4`
  - `-10^9 <= nums[i] <= 10^9`
  - `-10^9 <= target <= 10^9`
  - 只有一個有效答案存在
hints:
  - 最直觀的做法是用兩層迴圈暴力枚舉所有組合，時間複雜度為 O(n²)，思考看看有沒有更快的方法？
  - 使用 Hash Table（字典）來記錄已遍歷過的數字和其 index，對於每個數字，你可以在 O(1) 時間內查找它的「配對數字」是否已存在。
  - 對每個 nums[i]，計算 complement = target - nums[i]，然後查詢 complement 是否在 Hash Table 中。若是，直接回傳兩個 index；若否，將 nums[i] 加入 Hash Table。
