description: |
  Given an array of integers `nums` and an integer `target`, find two numbers in the array that add up to the target and return their indices.

  You may assume that each input has exactly one solution, and you may not use the same element twice.

  You may return the answer in any order.

  **Example 1:**
  ```
  Input: nums = [2,7,11,15], target = 9
  Output: [0,1]
  Explanation: nums[0] + nums[1] = 2 + 7 = 9, so return [0, 1].
  ```

  **Example 2:**
  ```
  Input: nums = [3,2,4], target = 6
  Output: [1,2]
  ```

  **Example 3:**
  ```
  Input: nums = [3,3], target = 6
  Output: [0,1]
  ```

  **Constraints:**
  - `2 <= nums.length <= 10^4`
  - `-10^9 <= nums[i] <= 10^9`
  - `-10^9 <= target <= 10^9`
  - Only one valid answer exists
hints:
  - The brute-force approach uses two nested loops to enumerate all combinations, with a time complexity of O(n²). Can you think of a faster approach?
  - Use a Hash Table (dictionary) to record each number seen so far and its index. For each number, you can check in O(1) time whether its "complement" already exists.
  - For each nums[i], compute complement = target - nums[i], then check if complement is in the Hash Table. If yes, return both indices; if no, add nums[i] to the Hash Table.
