title: Container With Most Water
slug: container-with-most-water
difficulty: MEDIUM
category: ALGORITHM
tags: [array, two-pointer, greedy]
concepts:
  - name: Array
    relevance: 0.5
  - name: Two Pointer
    relevance: 1.0
description: |
  You are given an integer array `height` of length `n`. There are `n` vertical lines drawn such that the two endpoints of the `i`th line are `(i, 0)` and `(i, height[i])`.

  Find two lines that together with the x-axis form a container that holds the most water.

  Return the maximum amount of water a container can store.

  **Notice that you may not slant the container.**

  **Example 1:**
  ```
  Input: height = [1,8,6,2,5,4,8,3,7]
  Output: 49
  Explanation: Choose index 1 (height 8) and index 8 (height 7), width = 7,
               area = min(8,7) * 7 = 49.
  ```

  **Example 2:**
  ```
  Input: height = [1,1]
  Output: 1
  ```

  **Constraints:**
  - `n == height.length`
  - `2 <= n <= 10^5`
  - `0 <= height[i] <= 10^4`
hints:
  - The brute-force approach enumerates all (i, j) pairs with O(n²) complexity. Consider that the area is determined by the shorter of the two heights and the distance between them — can you optimize using two pointers?
  - Set `left = 0` and `right = n - 1`, compute the current area as `min(height[left], height[right]) * (right - left)`, then move a pointer. Which one? Moving the taller line cannot increase the area since the bottleneck is the shorter line.
  - Each time, move the pointer on the **shorter** side (shrink inward), as only that can potentially find a larger area. Keep updating the maximum until `left == right`.
