description: |
  Given an integer array `nums`, find a **contiguous subarray** (containing at least one number) which has the largest product, and return the product.

  **Example 1:**
  ```
  Input: nums = [2,3,-2,4]
  Output: 6
  Explanation: [2,3] has the largest product, which is 6.
  ```

  **Example 2:**
  ```
  Input: nums = [-2,0,-1]
  Output: 0
  Explanation: The result cannot be 2, because [-2,-1] is not a subarray (there is a 0 in between).
  ```

  **Example 3:**
  ```
  Input: nums = [-2,3,-4]
  Output: 24
  ```

  **Constraints:**
  - `1 <= nums.length <= 2 * 10^4`
  - `-10 <= nums[i] <= 10`
  - The product of any subarray of `nums` is guaranteed to fit in a **32-bit integer**
hints:
  - "This problem is more complex than Maximum Subarray because a negative times a negative becomes positive. So you need to track not only the current maximum but also the current minimum."
  - "Maintain maxProd (the maximum product of the current subarray) and minProd (the minimum product of the current subarray). For each new element, the new maximum could be one of: nums[i], maxProd * nums[i], or minProd * nums[i]."
  - "When you encounter 0, the current product resets to zero, effectively starting fresh from the next element. When you encounter a negative number, the max and min swap — be careful about the update order (save the old maxProd before updating)."
