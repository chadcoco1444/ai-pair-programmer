description: |
  Given an integer array `nums`, return `true` if **any value appears at least twice** in the array, and return `false` if every element is distinct.

  **Example 1:**
  ```
  Input: nums = [1,2,3,1]
  Output: true
  ```

  **Example 2:**
  ```
  Input: nums = [1,2,3,4]
  Output: false
  ```

  **Example 3:**
  ```
  Input: nums = [1,1,1,3,3,4,3,2,4,2]
  Output: true
  ```

  **Constraints:**
  - `1 <= nums.length <= 10^5`
  - `-10^9 <= nums[i] <= 10^9`
hints:
  - The most straightforward approach is to sort and compare adjacent elements, with O(n log n) time complexity. Can you find an O(n) solution?
  - Use a Hash Set to track numbers seen so far. Traverse the array — if the current number is already in the Set, a duplicate exists.
  - Before adding each number to the Set, check if it already exists. Set lookups are O(1), giving O(n) overall time complexity and O(n) space complexity.
