description: |
  Given an integer array `nums`, return all the triplets `[nums[i], nums[j], nums[k]]` such that `i != j`, `i != k`, `j != k`, and `nums[i] + nums[j] + nums[k] == 0`.

  **Notice that the solution set must not contain duplicate triplets.**

  **Example 1:**
  ```
  Input: nums = [-1,0,1,2,-1,-4]
  Output: [[-1,-1,2],[-1,0,1]]
  Explanation:
  nums[0] + nums[1] + nums[2] = (-1) + 0 + 1 = 0
  nums[1] + nums[2] + nums[4] = 0 + 1 + (-1) = 0
  nums[0] + nums[3] + nums[4] = (-1) + 2 + (-1) = 0
  The distinct triplets are [-1,0,1] and [-1,-1,2].
  ```

  **Example 2:**
  ```
  Input: nums = [0,1,1]
  Output: []
  ```

  **Example 3:**
  ```
  Input: nums = [0,0,0]
  Output: [[0,0,0]]
  ```

  **Constraints:**
  - `3 <= nums.length <= 3000`
  - `-10^5 <= nums[i] <= 10^5`
hints:
  - Sort the array first. After sorting, for each element `nums[i]`, the problem reduces to finding two numbers in the subarray to its right that sum to `-nums[i]` (i.e., the Two Sum problem).
  - Use two pointers for the Two Sum part: set `left = i + 1` and `right = n - 1`. If `nums[left] + nums[right] + nums[i] < 0`, move `left` right; if `> 0`, move `right` left; if `= 0`, record the answer.
  - Skipping duplicates is key: in the outer loop, skip if `nums[i] == nums[i-1]`; after finding a valid triplet, also skip duplicate values when moving the pointers (e.g., `while left < right and nums[left] == nums[left-1]`) to avoid duplicate answers.
