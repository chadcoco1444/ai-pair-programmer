title: Product of Array Except Self
slug: product-of-array-except-self
difficulty: MEDIUM
category: ALGORITHM
tags: [array, prefix-sum]
concepts:
  - name: Array
    relevance: 1.0
description: |
  Given an integer array `nums`, return an array `answer` such that `answer[i]` is equal to the product of all the elements of `nums` **except** `nums[i]`.

  **The product of any prefix or suffix of `nums` is guaranteed to fit in a 32-bit integer. You must write an algorithm that runs in O(n) time and without using the division operation.**

  **Example 1:**
  ```
  Input: nums = [1,2,3,4]
  Output: [24,12,8,6]
  ```

  **Example 2:**
  ```
  Input: nums = [-1,1,0,-3,3]
  Output: [0,0,9,0,0]
  ```

  **Constraints:**
  - `2 <= nums.length <= 10^5`
  - `-30 <= nums[i] <= 30`
  - The input is guaranteed such that the product of any prefix or suffix fits in a **32-bit integer**

  **Follow up:** Can you solve it in O(1) extra space complexity? (The output array does not count as extra space.)
hints:
  - For answer[i], it is the product of all elements to the left of nums[i] multiplied by the product of all elements to the right. Can you compute these in two separate passes?
  - First pass left to right: build a prefix array where prefix[i] = nums[0] * nums[1] * ... * nums[i-1]. Second pass right to left: use a single variable to accumulate the suffix product.
  - Fill each position with its left prefix product in one pass, then multiply the right suffix product from right to left in a second pass. Only two O(n) traversals are needed, with a single variable for the suffix.
