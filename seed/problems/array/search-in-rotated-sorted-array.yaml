description: |
  There is an integer array `nums` sorted in ascending order (with **distinct** values), which is possibly rotated at an unknown pivot index (e.g., `[0,1,2,4,5,6,7]` might become `[4,5,6,7,0,1,2]`).

  Given the rotated array `nums` and an integer `target`, return the index of `target` if it is in `nums`, or `-1` if it is not.

  You must write an algorithm with **O(log n)** runtime complexity.

  **Example 1:**
  ```
  Input: nums = [4,5,6,7,0,1,2], target = 0
  Output: 4
  ```

  **Example 2:**
  ```
  Input: nums = [4,5,6,7,0,1,2], target = 3
  Output: -1
  ```

  **Example 3:**
  ```
  Input: nums = [1], target = 0
  Output: -1
  ```

  **Constraints:**
  - `1 <= nums.length <= 5000`
  - `-10^4 <= nums[i] <= 10^4`
  - All values of `nums` are **unique**
  - `nums` is an ascending array that is possibly rotated
  - `-10^4 <= target <= 10^4`
hints:
  - Even though the array is rotated, after picking `mid`, at least one of the two halves is always **sorted**. Use this property to determine which side the target is on.
  - If `nums[left] <= nums[mid]`, the left half is sorted. Check if target falls within `[nums[left], nums[mid]]` — if so, search left; otherwise search right.
  - If the left half is not sorted, the right half must be sorted. Check if target falls within `[nums[mid], nums[right]]` — if so, search right; otherwise search left. Each step eliminates half the search space, achieving O(log n).
