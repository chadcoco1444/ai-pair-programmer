description: |
  Given an integer array `nums`, find the **contiguous subarray** (containing at least one number) which has the largest sum and return its sum.

  **Example 1:**
  ```
  Input: nums = [-2,1,-3,4,-1,2,1,-5,4]
  Output: 6
  Explanation: The contiguous subarray [4,-1,2,1] has the largest sum = 6.
  ```

  **Example 2:**
  ```
  Input: nums = [1]
  Output: 1
  ```

  **Example 3:**
  ```
  Input: nums = [5,4,-1,7,8]
  Output: 23
  ```

  **Constraints:**
  - `1 <= nums.length <= 10^5`
  - `-10^4 <= nums[i] <= 10^4`

  **Follow up:** If you have figured out the O(n) solution, try coding another solution using the divide and conquer approach, which is more subtle.
hints:
  - Think about Kadane's Algorithm: at each element i, you have two choices — either extend the previous subarray by adding it, or start a new subarray beginning at this element.
  - Maintain two variables: `currentSum` (the sum of the current subarray) and `maxSum` (the largest sum seen so far). For each element, `currentSum = max(nums[i], currentSum + nums[i])`.
  - If `currentSum` becomes negative, extending it will only make the total smaller, so reset `currentSum = nums[i]` and start fresh from the current element. Update `maxSum` at every step.
