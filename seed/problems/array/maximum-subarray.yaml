title: Maximum Subarray
slug: maximum-subarray
difficulty: MEDIUM
category: ALGORITHM
tags: [array, dynamic-programming, divide-and-conquer]
concepts:
  - name: Array
    relevance: 0.7
  - name: Dynamic Programming
    relevance: 0.9
description: |
  給定一個整數陣列 `nums`，請找到一個具有最大和的**連續子陣列**（子陣列至少包含一個元素），並回傳其最大和。

  **範例 1：**
  ```
  輸入：nums = [-2,1,-3,4,-1,2,1,-5,4]
  輸出：6
  解釋：連續子陣列 [4,-1,2,1] 的和最大，為 6。
  ```

  **範例 2：**
  ```
  輸入：nums = [1]
  輸出：1
  ```

  **範例 3：**
  ```
  輸入：nums = [5,4,-1,7,8]
  輸出：23
  ```

  **限制條件：**
  - `1 <= nums.length <= 10^5`
  - `-10^4 <= nums[i] <= 10^4`

  **進階：** 如果你已實現 O(n) 解法，嘗試使用分治法（Divide and Conquer）在 O(n log n) 時間內解決。
hints:
  - 思考 Kadane's Algorithm：當你在第 i 個元素時，你有兩個選擇——要麼把它加入前面的子陣列，要麼從它重新開始一個子陣列。
  - 維護兩個變數：`currentSum`（當前子陣列的和）和 `maxSum`（目前見過的最大和）。對每個元素，`currentSum = max(nums[i], currentSum + nums[i])`。
  - 若 `currentSum` 變成負數，繼續延伸只會讓總和更小，所以重置 `currentSum = nums[i]`，從當前元素重新開始。每步都更新 `maxSum`。
