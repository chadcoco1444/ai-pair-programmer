description: |
  Suppose an array of length `n` sorted in ascending order is **rotated** between `1` and `n` times (e.g., `[0,1,2,4,5,6,7]` might become `[4,5,6,7,0,1,2]`).

  Given the rotated array `nums` with **no duplicate elements**, find the minimum element.

  You must write an algorithm that runs in **O(log n)** time.

  **Example 1:**
  ```
  Input: nums = [3,4,5,1,2]
  Output: 1
  Explanation: The original array was [1,2,3,4,5] rotated at index 3.
  ```

  **Example 2:**
  ```
  Input: nums = [4,5,6,7,0,1,2]
  Output: 0
  ```

  **Example 3:**
  ```
  Input: nums = [11,13,15,17]
  Output: 11
  Explanation: The array was not rotated; the minimum is the first element.
  ```

  **Constraints:**
  - `1 <= nums.length <= 5000`
  - `-5000 <= nums[i] <= 5000`
  - All integers in `nums` are **unique**
  - `nums` is a sorted array rotated between `1` and `n` times
hints:
  - The problem requires O(log n), so use Binary Search. For the middle element `mid`, it is either in the sorted left half or the sorted right half.
  - Compare `nums[mid]` with `nums[right]`: if `nums[mid] > nums[right]`, the rotation point (minimum) is in the right half, so move `left = mid + 1`; otherwise the minimum is in the left half (including mid), so move `right = mid`.
  - When `left == right`, `nums[left]` is the minimum. Note: if the array is fully sorted (no rotation), `nums[0]` is the minimum, and this algorithm handles that correctly.
