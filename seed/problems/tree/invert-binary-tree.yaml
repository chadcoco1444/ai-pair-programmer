title: Invert Binary Tree
slug: invert-binary-tree
difficulty: EASY
category: ALGORITHM
tags: [tree, dfs, bfs, recursion]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Queue
    relevance: 0.5
description: |
  給定一棵二元樹的根節點 `root`，請將其**左右翻轉**（鏡像），並回傳翻轉後的樹的根節點。

  **範例 1：**
  ```
  輸入：root = [4,2,7,1,3,6,9]
  輸出：[4,7,2,9,6,3,1]
  解釋：
      4              4
     / \    →       / \
    2   7          7   2
   / \ / \        / \ / \
  1  3 6  9      9  6 3  1
  ```

  **範例 2：**
  ```
  輸入：root = [2,1,3]
  輸出：[2,3,1]
  ```

  **範例 3：**
  ```
  輸入：root = []
  輸出：[]
  ```

  **限制條件：**
  - 樹中節點數量範圍為 `[0, 100]`
  - `-100 <= Node.val <= 100`
hints:
  - 遞迴思路：對每個節點，交換其左右子節點，然後對交換後的左子樹和右子樹分別遞迴執行同樣的操作。
  - 基底情形：當節點為 null 時，直接回傳 null。整棵樹的翻轉可以分解為每個子樹的翻轉。
  - 也可以使用 BFS 迭代解法：用佇列層序遍歷，對每個出佇列的節點交換其左右子節點，再把非空的子節點加入佇列。
