  - name: Queue
    relevance: 0.5
description: |
  Given the root node `root` of a binary tree, **invert** the tree (mirror it), and return the root node of the inverted tree.

  **Example 1:**
  ```
  Input: root = [4,2,7,1,3,6,9]
  Output: [4,7,2,9,6,3,1]
  Explanation:
      4              4
     / \    →       / \
    2   7          7   2
   / \ / \        / \ / \
  1  3 6  9      9  6 3  1
  ```

  **Example 2:**
  ```
  Input: root = [2,1,3]
  Output: [2,3,1]
  ```

  **Example 3:**
  ```
  Input: root = []
  Output: []
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[0, 100]`
  - `-100 <= Node.val <= 100`
hints:
  - Recursive approach: for each node, swap its left and right children, then recursively perform the same operation on the (now swapped) left and right subtrees.
  - Base case: when the node is null, return null directly. The inversion of the entire tree can be decomposed into the inversion of each subtree.
  - You can also use an iterative BFS approach: use a queue for level-order traversal, swap the left and right children of each dequeued node, then enqueue the non-null children.
