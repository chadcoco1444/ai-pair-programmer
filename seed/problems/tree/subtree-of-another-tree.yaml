title: Subtree of Another Tree
slug: subtree-of-another-tree
difficulty: EASY
category: ALGORITHM
tags: [tree, dfs, string]
concepts:
  - name: Tree
    relevance: 1.0
description: |
  Given two binary trees `root` and `subRoot`, determine whether `subRoot` is a **subtree** of `root`.

  A subtree of `root` is considered to exist if there is a node in `root` such that the subtree rooted at that node is identical to `subRoot` in both structure and node values.

  **Example 1:**
  ```
  Input: root = [3,4,5,1,2], subRoot = [4,1,2]
  Output: true
  Explanation:
       3
      / \
     4   5       subRoot:  4
    / \                   / \
   1   2                 1   2
  subRoot is a subtree of root (rooted at node 4).
  ```

  **Example 2:**
  ```
  Input: root = [3,4,5,1,2,null,null,null,null,0], subRoot = [4,1,2]
  Output: false
  Explanation: The left subtree of node 4 in root has an extra node 0, so the structure is different.
  ```

  **Constraints:**
  - The number of nodes in the `root` tree is in the range `[1, 2000]`
  - The number of nodes in the `subRoot` tree is in the range `[1, 1000]`
  - `-10^4 <= Node.val <= 10^4`
hints:
  - For each node in `root`, check whether the subtree rooted at it is identical to `subRoot`. You can reuse the "Same Tree" logic as a helper function.
  - Recursive main function: if the current node is null, return false; if `isSameTree(root, subRoot)` is true, return true; otherwise, recursively check whether the left or right subtree contains subRoot.
  - Advanced approach: serialize both trees to strings (with special delimiters to avoid false matches), then check whether subRoot's string is a substring of root's string (using KMP or built-in contains).
