description: |
  Given the root node `root` of a binary tree, return its **maximum depth**.

  The maximum depth of a binary tree is the number of nodes along the longest path from the root node down to the farthest leaf node.

  **Example 1:**
  ```
  Input: root = [3,9,20,null,null,15,7]
  Output: 3
  Explanation:
      3
     / \
    9  20
       / \
      15   7
  The longest path is 3 → 20 → 15 (or 3 → 20 → 7), with depth 3.
  ```

  **Example 2:**
  ```
  Input: root = [1,null,2]
  Output: 2
  ```

  **Example 3:**
  ```
  Input: root = []
  Output: 0
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[0, 10^4]`
  - `-100 <= Node.val <= 100`
hints:
  - Think about the recursive definition: the maximum depth of a tree equals the larger of the maximum depths of the left and right subtrees, plus 1 (for the root node itself).
  - Recursive base case: when the node is null, the depth is 0. For each node, call max(left_depth, right_depth) + 1.
  - You can also use BFS (level order traversal): use a queue to process nodes level by level, incrementing the depth counter after each level is fully processed, and return the total count of levels at the end.
