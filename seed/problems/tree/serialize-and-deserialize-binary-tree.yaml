  - name: Tree
    relevance: 1.0
  - name: Queue
    relevance: 0.8
description: |
  **Serialization** is the process of converting a data structure or object into a sequence of bits so that it can be stored in a file or memory buffer, or transmitted across a network, and later reconstructed in the same or another computer environment.

  Design an algorithm to serialize and deserialize a binary tree. There is no restriction on how serialization and deserialization should work — you just need to ensure the binary tree can be correctly serialized to a string and deserialized back from that string.

  **Example 1:**
  ```
  Input: root = [1,2,3,null,null,4,5]
  Output: [1,2,3,null,null,4,5]
  Explanation: The serialized string (e.g., "1,2,3,null,null,4,5") can be deserialized back to the original tree structure.
  ```

  **Example 2:**
  ```
  Input: root = []
  Output: []
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[0, 10^4]`
  - `-1000 <= Node.val <= 1000`
hints:
  - Use BFS level-order traversal for serialization: separate node values with commas and record null nodes as a special token (e.g., "null").
  - For deserialization, split the string into an array and rebuild the tree level by level: use a queue to hold parent nodes waiting to be filled, and assign left and right children sequentially from the array.
  - You can also use preorder DFS recursion: during serialization, recursively output node values, representing null as "#"; during deserialization, likewise recurse and pull values from the string in preorder sequence to rebuild the tree.
