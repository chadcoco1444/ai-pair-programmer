title: Serialize and Deserialize Binary Tree
slug: serialize-and-deserialize-binary-tree
difficulty: HARD
category: ALGORITHM
tags: [tree, dfs, bfs, design, string]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Queue
    relevance: 0.8
description: |
  **序列化**是指將資料結構或物件轉換為位元序列的過程，使其可以儲存在檔案或記憶體緩衝區中，或通過網路連線傳輸，之後可在相同或不同的電腦環境中重建。

  請設計一種算法來序列化和反序列化二元樹。序列化和反序列化的方式不受限制，只需確保二元樹能夠被正確序列化為字串，並且能夠從該字串反序列化還原。

  **範例 1：**
  ```
  輸入：root = [1,2,3,null,null,4,5]
  輸出：[1,2,3,null,null,4,5]
  解釋：序列化後的字串（例如 "1,2,3,null,null,4,5"）可以被反序列化為原始的樹結構。
  ```

  **範例 2：**
  ```
  輸入：root = []
  輸出：[]
  ```

  **限制條件：**
  - 樹中節點數量範圍為 `[0, 10^4]`
  - `-1000 <= Node.val <= 1000`
hints:
  - 使用 BFS 層序遍歷進行序列化：將節點值以逗號分隔，null 節點記錄為特殊字元（如 "null"）。
  - 反序列化時，將字串分割為陣列，按層序重建樹：用佇列存放待填充子節點的父節點，依序從陣列取值填入左右子節點。
  - 也可以使用前序 DFS 遞迴：序列化時遞迴輸出節點值，null 用 "#" 表示；反序列化時同樣遞迴，按前序順序依次從字串取出值重建樹。
