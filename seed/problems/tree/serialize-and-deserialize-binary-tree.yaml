testCases:
  - input: "root = [1,2,3,null,null,4,5]"
    expected: "[1,2,3,null,null,4,5]"
    isHidden: false
    isKiller: false
  - input: "root = []"
    expected: "[]"
    isHidden: false
    isKiller: false
  - input: "root = [1]"
    expected: "[1]"
    isHidden: false
    isKiller: false
  - input: "root = [1,2,null,3,null,4]"
    expected: "[1,2,null,3,null,4]"
    isHidden: true
    isKiller: false
  - input: "root = [0,-1000,1000,null,null,-999,999]"
    expected: "[0,-1000,1000,null,null,-999,999]"
    isHidden: true
    isKiller: true
