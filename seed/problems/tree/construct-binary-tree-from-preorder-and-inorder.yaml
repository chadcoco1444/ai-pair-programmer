title: Construct Binary Tree from Preorder and Inorder Traversal
slug: construct-binary-tree-from-preorder-and-inorder
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, array, divide-and-conquer, hash-table]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Array
    relevance: 0.8
  - name: Hash Table
    relevance: 0.7
description: |
  給定兩個整數陣列 `preorder` 和 `inorder`，其中 `preorder` 是某棵二元樹的**前序遍歷**結果，`inorder` 是同一棵樹的**中序遍歷**結果，請建構並回傳這棵二元樹。

  **範例 1：**
  ```
  輸入：preorder = [3,9,20,15,7], inorder = [9,3,15,20,7]
  輸出：[3,9,20,null,null,15,7]
  解釋：
      3
     / \
    9  20
       / \
      15   7
  前序 [3,9,20,15,7]：根 → 左子樹 → 右子樹
  中序 [9,3,15,20,7]：左子樹 → 根 → 右子樹
  ```

  **範例 2：**
  ```
  輸入：preorder = [-1], inorder = [-1]
  輸出：[-1]
  ```

  **限制條件：**
  - `1 <= preorder.length <= 3000`
  - `inorder.length == preorder.length`
  - `-3000 <= preorder[i], inorder[i] <= 3000`
  - `preorder` 和 `inorder` 均由**不重複**的元素組成
  - `inorder` 中每個值都在 `preorder` 中出現
  - `preorder` 保證是樹的有效前序遍歷序列
  - `inorder` 保證是樹的有效中序遍歷序列
hints:
  - 前序遍歷的第一個元素一定是當前子樹的根節點。在中序遍歷中找到這個根節點的位置，其左側是左子樹，右側是右子樹。
  - 使用 Hash Table 預先儲存中序遍歷每個值的索引，避免每次遞迴都線性搜索，將整體時間複雜度從 O(n²) 降低到 O(n)。
  - 遞迴建構：根據中序遍歷中根節點的位置計算左子樹的節點數，從而在前序遍歷中分割出左子樹和右子樹的部分，分別遞迴建構。
