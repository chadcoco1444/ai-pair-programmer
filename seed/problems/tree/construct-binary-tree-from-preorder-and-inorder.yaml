title: Construct Binary Tree from Preorder and Inorder Traversal
slug: construct-binary-tree-from-preorder-and-inorder
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, array, divide-and-conquer, hash-table]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Array
    relevance: 0.8
  - name: Hash Table
    relevance: 0.7
description: |
  Given two integer arrays `preorder` and `inorder`, where `preorder` is the **preorder traversal** of a binary tree and `inorder` is the **inorder traversal** of the same tree, construct and return the binary tree.

  **Example 1:**
  ```
  Input: preorder = [3,9,20,15,7], inorder = [9,3,15,20,7]
  Output: [3,9,20,null,null,15,7]
  Explanation:
      3
     / \
    9  20
       / \
      15   7
  Preorder [3,9,20,15,7]: root → left subtree → right subtree
  Inorder [9,3,15,20,7]: left subtree → root → right subtree
  ```

  **Example 2:**
  ```
  Input: preorder = [-1], inorder = [-1]
  Output: [-1]
  ```

  **Constraints:**
  - `1 <= preorder.length <= 3000`
  - `inorder.length == preorder.length`
  - `-3000 <= preorder[i], inorder[i] <= 3000`
  - `preorder` and `inorder` consist of **unique** elements
  - Each value in `inorder` also appears in `preorder`
  - `preorder` is guaranteed to be a valid preorder traversal sequence of a tree
  - `inorder` is guaranteed to be a valid inorder traversal sequence of a tree
hints:
  - The first element of the preorder traversal is always the root of the current subtree. Find the position of this root in the inorder traversal — everything to its left is the left subtree, and everything to its right is the right subtree.
  - Use a Hash Table to pre-store the index of each value in the inorder traversal, avoiding linear search on every recursive call, reducing overall time complexity from O(n²) to O(n).
  - Recursive construction: use the root's position in the inorder traversal to calculate the size of the left subtree, then split the preorder traversal into left and right subtree portions and recursively construct each.
