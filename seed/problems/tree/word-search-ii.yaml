    relevance: 0.8
description: |
  Given an `m x n` character matrix `board` and a list of strings `words`, return all words that can be found in the matrix.

  A word must be constructed from letters of sequentially adjacent cells, where "adjacent" means horizontally or vertically adjacent. **The same cell may not be used more than once in a single word.**

  **Example 1:**
  ```
  Input:
  board = [
    ["o","a","a","n"],
    ["e","t","a","e"],
    ["i","h","k","r"],
    ["i","f","l","v"]
  ]
  words = ["oath","pea","eat","rain"]
  Output: ["eat","oath"]
  ```

  **Example 2:**
  ```
  Input:
  board = [["a","b"],["c","d"]], words = ["abcb"]
  Output: []
  Explanation: "abcb" cannot be formed without reusing a cell.
  ```

  **Constraints:**
  - `m == board.length`
  - `n == board[i].length`
  - `1 <= m, n <= 12`
  - `board[i][j]` is an uppercase or lowercase English letter
  - `1 <= words.length <= 3 * 10^4`
  - `1 <= words[i].length <= 10`
  - `words[i]` consists only of lowercase English letters
  - All strings in `words` are unique
hints:
  - Do not run a separate DFS for each word (too slow). Instead, insert all words into a Trie, then start a single DFS from every cell in the matrix while simultaneously navigating the Trie — this allows searching for all words at once.
  - During DFS backtracking, mark visited cells with a special character (e.g., '#') and restore the original value when unwinding, to prevent reusing the same cell within a single word path.
  - Important optimization: once all words under a Trie node's subtree have been found, remove that node from the Trie (pruning). This avoids redundant searches for already-found words and significantly improves performance.
