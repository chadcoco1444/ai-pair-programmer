concepts:
  - name: Tree
    relevance: 1.0
  - name: Queue
    relevance: 1.0
description: |
  Given the root node `root` of a binary tree, return the **level order traversal** of its node values (i.e., from left to right, level by level).

  The result should be returned as a 2D array, where each sub-array contains all node values at that level.

  **Example 1:**
  ```
  Input: root = [3,9,20,null,null,15,7]
  Output: [[3],[9,20],[15,7]]
  Explanation:
      3          ← Level 1
     / \
    9  20        ← Level 2
       / \
      15   7     ← Level 3
  ```

  **Example 2:**
  ```
  Input: root = [1]
  Output: [[1]]
  ```

  **Example 3:**
  ```
  Input: root = []
  Output: []
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[0, 2000]`
  - `-1000 <= Node.val <= 1000`
hints:
  - Level order traversal naturally maps to BFS (Breadth-First Search). Use a queue and initialize it with the root node.
  - Each time you process the queue, first record the current queue size (i.e., the number of nodes in the current level), then dequeue nodes one by one to collect all values at that level, while enqueuing their children.
  - After processing a level, add the collected node values to the result array, then continue to the next level until the queue is empty.
