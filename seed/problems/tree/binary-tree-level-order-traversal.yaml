title: Binary Tree Level Order Traversal
slug: binary-tree-level-order-traversal
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, bfs]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Queue
    relevance: 1.0
description: |
  給定一棵二元樹的根節點 `root`，請回傳其節點值的**層序遍歷**結果（即逐層從左到右訪問所有節點）。

  結果應以二維陣列回傳，每個子陣列對應一層的所有節點值。

  **範例 1：**
  ```
  輸入：root = [3,9,20,null,null,15,7]
  輸出：[[3],[9,20],[15,7]]
  解釋：
      3          ← 第 1 層
     / \
    9  20        ← 第 2 層
       / \
      15   7     ← 第 3 層
  ```

  **範例 2：**
  ```
  輸入：root = [1]
  輸出：[[1]]
  ```

  **範例 3：**
  ```
  輸入：root = []
  輸出：[]
  ```

  **限制條件：**
  - 樹中節點數量範圍為 `[0, 2000]`
  - `-1000 <= Node.val <= 1000`
hints:
  - 層序遍歷天然對應 BFS（廣度優先搜索）。使用一個佇列，初始放入根節點。
  - 每次處理佇列時，先記錄當前佇列大小（即當前層的節點數），然後依次出佇列並收集該層的所有節點值，同時將其子節點加入佇列。
  - 處理完一層後，將收集到的節點值加入結果陣列，再繼續處理下一層，直到佇列為空。
