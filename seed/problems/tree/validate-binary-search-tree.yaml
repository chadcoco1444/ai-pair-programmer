title: Validate Binary Search Tree
slug: validate-binary-search-tree
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, dfs, bst]
concepts:
  - name: Tree
    relevance: 1.0
description: |
  Given the root node `root` of a binary tree, determine whether it is a valid **binary search tree (BST)**.

  A valid binary search tree is defined as follows:
  - The left subtree of a node contains only nodes with values **less than** the node's value.
  - The right subtree of a node contains only nodes with values **greater than** the node's value.
  - Both the left and right subtrees must also be binary search trees.

  **Example 1:**
  ```
  Input: root = [2,1,3]
  Output: true
  Explanation:
    2
   / \
  1   3
  Left child 1 < 2, right child 3 > 2, which is a valid BST.
  ```

  **Example 2:**
  ```
  Input: root = [5,1,4,null,null,3,6]
  Output: false
  Explanation: The root is 5 and the right child is 4, but 4 < 5, which violates the BST rule.
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[1, 10^4]`
  - `-2^31 <= Node.val <= 2^31 - 1`
hints:
  - You cannot only compare each node with its direct children — you must ensure all nodes in an entire subtree fall within a valid range. Use recursion with bounds: pass a valid value range [min, max] to each node.
  - Recursive check: for the left subtree, all node values must be less than the current parent's value (upper bound updated); for the right subtree, all node values must be greater than the current parent's value (lower bound updated).
  - Another approach is to use the inorder traversal property of BSTs: an inorder traversal of a valid BST should yield a strictly increasing sequence. During traversal, track the previously visited node's value — if the current value is not greater than the previous one, it is not a valid BST.
