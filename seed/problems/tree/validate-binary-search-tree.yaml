title: Validate Binary Search Tree
slug: validate-binary-search-tree
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, dfs, bst]
concepts:
  - name: Tree
    relevance: 1.0
description: |
  給定一棵二元樹的根節點 `root`，請判斷它是否是一棵有效的**二元搜索樹（BST）**。

  有效的二元搜索樹定義如下：
  - 節點的左子樹只包含**小於**當前節點的數。
  - 節點的右子樹只包含**大於**當前節點的數。
  - 所有左子樹和右子樹自身也必須是二元搜索樹。

  **範例 1：**
  ```
  輸入：root = [2,1,3]
  輸出：true
  解釋：
    2
   / \
  1   3
  左子節點 1 < 2，右子節點 3 > 2，是有效的 BST。
  ```

  **範例 2：**
  ```
  輸入：root = [5,1,4,null,null,3,6]
  輸出：false
  解釋：根節點為 5，右子節點為 4，但 4 < 5，不符合 BST 規則。
  ```

  **限制條件：**
  - 樹中節點數量範圍為 `[1, 10^4]`
  - `-2^31 <= Node.val <= 2^31 - 1`
hints:
  - 不能只比較每個節點和其直接子節點，必須確保整個子樹的所有節點值都在合法範圍內。使用帶範圍的遞迴：為每個節點傳遞允許的值範圍 [min, max]。
  - 遞迴判斷：對左子樹，節點值必須小於當前父節點值（上界更新）；對右子樹，節點值必須大於當前父節點值（下界更新）。
  - 另一個方法是利用 BST 的中序遍歷特性：中序遍歷 BST 應該得到嚴格遞增的序列。遍歷時追蹤上一個訪問的節點值，若當前值不大於前一個值，則不是有效 BST。
