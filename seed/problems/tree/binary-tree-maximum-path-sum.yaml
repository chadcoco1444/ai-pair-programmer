title: Binary Tree Maximum Path Sum
slug: binary-tree-maximum-path-sum
difficulty: HARD
category: ALGORITHM
tags: [tree, dfs, dynamic-programming]
concepts:
  - name: Tree
    relevance: 1.0
  - name: Dynamic Programming
    relevance: 0.8
description: |
  二元樹中的**路徑**被定義為一條從某節點出發，到另一個節點結束的序列，序列中每對相鄰節點之間都有一條邊。路徑**至少包含一個節點**，且不需要經過根節點。

  給定一棵二元樹的根節點 `root`，請找出**路徑和最大**的路徑，並回傳該路徑的和。

  **範例 1：**
  ```
  輸入：root = [1,2,3]
  輸出：6
  解釋：最優路徑為 2 → 1 → 3，路徑和為 2 + 1 + 3 = 6。
  ```

  **範例 2：**
  ```
  輸入：root = [-10,9,20,null,null,15,7]
  輸出：42
  解釋：最優路徑為 15 → 20 → 7，路徑和為 15 + 20 + 7 = 42。
  ```

  **範例 3：**
  ```
  輸入：root = [-3]
  輸出：-3
  解釋：樹中只有一個節點，路徑和為 -3。
  ```

  **限制條件：**
  - 樹中節點數量範圍為 `[1, 3 * 10^4]`
  - `-1000 <= Node.val <= 1000`
hints:
  - 關鍵觀察：對於任意節點，通過它的最大路徑可以包含（1）只含該節點，（2）該節點 + 左子路徑，（3）該節點 + 右子路徑，或（4）左子路徑 + 該節點 + 右子路徑。
  - 使用後序遍歷（DFS）：每個節點回傳「向上貢獻的最大值」（只能選左或右其中一條路徑），同時在內部更新全域最大路徑和。
  - 注意子路徑貢獻可以為負數，此時捨棄（取 0）比加上負值更優。使用一個全域變數 `max_sum` 來追蹤到目前為止見過的最大路徑和。
