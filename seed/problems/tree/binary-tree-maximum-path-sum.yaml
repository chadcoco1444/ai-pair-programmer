  - name: Dynamic Programming
    relevance: 0.8
description: |
  A **path** in a binary tree is defined as a sequence starting from some node and ending at another node, where each pair of adjacent nodes in the sequence has an edge. A path **must contain at least one node** and does not need to pass through the root.

  Given the root node `root` of a binary tree, find the path with the **maximum path sum** and return that sum.

  **Example 1:**
  ```
  Input: root = [1,2,3]
  Output: 6
  Explanation: The optimal path is 2 → 1 → 3, with path sum 2 + 1 + 3 = 6.
  ```

  **Example 2:**
  ```
  Input: root = [-10,9,20,null,null,15,7]
  Output: 42
  Explanation: The optimal path is 15 → 20 → 7, with path sum 15 + 20 + 7 = 42.
  ```

  **Example 3:**
  ```
  Input: root = [-3]
  Output: -3
  Explanation: There is only one node in the tree, with path sum -3.
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[1, 3 * 10^4]`
  - `-1000 <= Node.val <= 1000`
hints:
  - Key observation: for any node, the maximum path passing through it can include (1) only that node, (2) that node + left sub-path, (3) that node + right sub-path, or (4) left sub-path + that node + right sub-path.
  - Use post-order traversal (DFS): each node returns the "maximum contribution going upward" (can only choose the left or right path, not both), while internally updating a global maximum path sum.
  - Note that a sub-path contribution can be negative; in that case, discarding it (taking 0) is better than adding a negative value. Use a global variable `max_sum` to track the maximum path sum seen so far.
