title: Implement Trie (Prefix Tree)
slug: implement-trie
difficulty: MEDIUM
category: ALGORITHM
tags: [trie, design, string, hash-table]
concepts:
  - name: Tree
    relevance: 0.9
  - name: Hash Table
    relevance: 0.8
description: |
  Implement a **Trie (prefix tree)** class that supports the following operations:

  - `Trie()` Initializes the Trie object.
  - `void insert(String word)` Inserts the string `word` into the Trie.
  - `boolean search(String word)` Returns `true` if the string `word` is in the Trie (i.e., was previously inserted), and `false` otherwise.
  - `boolean startsWith(String prefix)` Returns `true` if there is a previously inserted string that has the prefix `prefix`, and `false` otherwise.

  **Example 1:**
  ```
  Input:
  ["Trie", "insert", "search", "search", "startsWith", "insert", "search"]
  [[], ["apple"], ["apple"], ["app"], ["app"], ["app"], ["app"]]
  Output:
  [null, null, true, false, true, null, true]

  Explanation:
  Trie trie = new Trie();
  trie.insert("apple");    // insert "apple"
  trie.search("apple");    // return true
  trie.search("app");      // return false ("app" was not inserted)
  trie.startsWith("app");  // return true ("apple" starts with "app")
  trie.insert("app");      // insert "app"
  trie.search("app");      // return true
  ```

  **Constraints:**
  - `1 <= word.length, prefix.length <= 2000`
  - `word` and `prefix` consist only of lowercase English letters
  - The total number of calls to insert, search, and startsWith will not exceed 3 * 10^4
hints:
  - A Trie node needs two attributes: an array (or Hash Map) of 26 child nodes, and a boolean flag indicating whether the node marks the end of a word.
  - Insert operation: starting from the root, for each character in the string, create a new node if the corresponding child does not exist, then move to that child. Mark the final node with is_end = true.
  - The logic for search and startsWith is similar: both traverse the character path from the root to the end. The difference is that search must check whether the final node has the is_end flag, while startsWith only needs to confirm that the path exists.
