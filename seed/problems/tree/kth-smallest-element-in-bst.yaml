description: |
  Given the root node `root` of a binary search tree and an integer `k`, return the **k-th smallest** node value in the tree (k is 1-indexed).

  **Example 1:**
  ```
  Input: root = [3,1,4,null,2], k = 1
  Output: 1
  Explanation:
      3
     / \
    1   4
     \
      2
  Inorder traversal: [1, 2, 3, 4], the 1st smallest element is 1.
  ```

  **Example 2:**
  ```
  Input: root = [5,3,6,2,4,null,null,1], k = 3
  Output: 3
  Explanation: Inorder traversal: [1, 2, 3, 4, 5, 6], the 3rd smallest element is 3.
  ```

  **Constraints:**
  - The number of nodes in the tree is `n`, where `1 <= k <= n <= 10^4`
  - `0 <= Node.val <= 10^4`

  **Follow-up:** If the BST is modified frequently (insertions/deletions) and you need to find the k-th smallest value frequently, how would you optimize?
hints:
  - Leverage a key property of BSTs: the inorder traversal (left → root → right) yields a strictly increasing sequence. Therefore, the k-th smallest element is simply the k-th element in the inorder traversal.
  - Recursive approach: perform an inorder traversal, maintain a counter, and record and return the current node's value when the counter reaches k.
  - Iterative approach: use an explicit stack to simulate inorder traversal, visiting nodes one by one and returning the value at the k-th node. The iterative method can stop immediately upon finding the k-th element, avoiding traversal of the entire tree.
