concepts:
  - name: Tree
    relevance: 1.0
description: |
  Given the root nodes `p` and `q` of two binary trees, determine whether the two trees are **identical**.

  Two trees are considered identical if they have the same structure and every corresponding node has the same value.

  **Example 1:**
  ```
  Input: p = [1,2,3], q = [1,2,3]
  Output: true
  Explanation:
    1       1
   / \     / \
  2   3   2   3
  Both trees have identical structure and values.
  ```

  **Example 2:**
  ```
  Input: p = [1,2], q = [1,null,2]
  Output: false
  Explanation: The two trees have different structures.
  ```

  **Example 3:**
  ```
  Input: p = [1,2,1], q = [1,1,2]
  Output: false
  Explanation: The two trees have the same structure, but different node values.
  ```

  **Constraints:**
  - The number of nodes in both trees is in the range `[0, 100]`
  - `-10^4 <= Node.val <= 10^4`
hints:
  - Use recursive thinking: two trees are identical if and only if (1) the current root values are equal, (2) the left subtrees are identical, and (3) the right subtrees are identical.
  - Base cases: if both nodes are null, return true; if only one is null, return false; if their values are not equal, return false.
  - You can also use an iterative approach with a stack to traverse both trees simultaneously and compare corresponding nodes one by one.
