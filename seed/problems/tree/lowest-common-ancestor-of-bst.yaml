title: Lowest Common Ancestor of a BST
slug: lowest-common-ancestor-of-bst
difficulty: MEDIUM
category: ALGORITHM
tags: [tree, dfs, bst]
concepts:
  - name: Tree
    relevance: 1.0
description: |
  Given a binary search tree (BST), find the **lowest common ancestor (LCA)** of two specified nodes `p` and `q`.

  The lowest common ancestor is defined as: for two nodes p and q, the deepest node x in the tree such that x is an ancestor of both p and q (a node can be an ancestor of itself).

  **Example 1:**
  ```
  Input: root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 8
  Output: 6
  Explanation: The lowest common ancestor of nodes 2 and 8 is the root node 6.
  ```

  **Example 2:**
  ```
  Input: root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 4
  Output: 2
  Explanation: The lowest common ancestor of nodes 2 and 4 is node 2 itself (a node can be an ancestor of itself).
  ```

  **Example 3:**
  ```
  Input: root = [2,1], p = 2, q = 1
  Output: 2
  ```

  **Constraints:**
  - The number of nodes in the tree is in the range `[2, 10^5]`
  - `-10^9 <= Node.val <= 10^9`
  - All node values are unique
  - Both p and q exist in the BST, and p != q
hints:
  - Make full use of BST properties: if both p and q are less than the current node, the LCA must be in the left subtree; if both are greater, the LCA must be in the right subtree.
  - If p's value is less than or equal to the current node and q's value is greater than or equal to the current node (or vice versa), then the current node is the LCA, because p and q are on opposite sides of it (or one of them is the current node itself).
  - This problem can be solved iteratively without recursion: starting from the root, decide to go left, go right, or stop based on how p's and q's values compare to the current node.
