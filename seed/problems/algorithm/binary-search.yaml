description: |
  給定一個已排序的整數陣列 `nums` 和一個目標值 `target`，如果 `target` 存在於陣列中，返回其索引；否則返回 `-1`。

  你必須使用 O(log n) 的演算法。

  **範例：**
  ```
  輸入: nums = [-1,0,3,5,9,12], target = 9
  輸出: 4
  ```

  **限制：**
  - 1 <= nums.length <= 10^4
  - nums 中的所有元素互不相同
  - nums 按升序排列

hints:
  - 如何利用「已排序」這個條件？
  - 每次比較後，你可以排除多少候選元素？
  - 注意邊界條件：left 和 right 的初始值、更新方式、迴圈終止條件。

