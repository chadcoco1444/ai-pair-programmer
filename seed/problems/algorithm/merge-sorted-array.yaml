description: |
  給定兩個已排序的整數陣列 `nums1` 和 `nums2`，將 `nums2` 合併到 `nums1` 中，使合併後的陣列仍然有序。

  `nums1` 的初始長度為 `m + n`，前 `m` 個元素是有效的，後 `n` 個元素為 0（用作佔位）。

  **範例：**
  ```
  輸入: nums1 = [1,2,3,0,0,0], m = 3, nums2 = [2,5,6], n = 3
  輸出: [1,2,2,3,5,6]
  ```

  **限制：**
  - 0 <= m, n <= 200

hints:
  - 如果從前面開始合併，會遇到什麼問題？
  - 從後面開始合併呢？哪個陣列的末尾有空間？
  - 邊界條件：如果 nums2 的所有元素都比 nums1 小怎麼辦？

