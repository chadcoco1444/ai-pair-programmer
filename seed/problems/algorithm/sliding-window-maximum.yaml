description: |
  給定一個整數陣列 `nums` 和一個窗口大小 `k`，窗口從陣列最左邊滑到最右邊。每次只能看到窗口中的 `k` 個數字，返回每個窗口位置的最大值。

  **範例：**
  ```
  輸入: nums = [1,3,-1,-3,5,3,6,7], k = 3
  輸出: [3,3,5,5,6,7]
  ```

  **限制：**
  - 1 <= nums.length <= 10^5
  - -10^4 <= nums[i] <= 10^4
  - 1 <= k <= nums.length

hints:
  - 暴力解的時間複雜度是多少？能否做到 O(n)？
  - 你需要一個資料結構，能夠快速找到最大值，同時能夠移除不在窗口內的元素。
  - 考慮使用「單調遞減佇列」：如果新元素比佇列尾部的元素大，那尾部的元素還有用嗎？

