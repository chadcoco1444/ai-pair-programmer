title: Pacific Atlantic Water Flow
slug: pacific-atlantic-water-flow
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, dfs, bfs, matrix]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Queue
    relevance: 0.6
description: |
  給定一個 `m x n` 的矩陣 `heights`，其中 `heights[r][c]` 代表位置 `(r, c)` 的海拔高度。

  矩陣的左側和上側與**太平洋**相鄰，右側和下側與**大西洋**相鄰。

  雨水可以從海拔**較高或相同**的相鄰格子（上下左右）流向海拔**較低或相同**的格子，最終流入海洋。

  請找出所有雨水**既能流入太平洋、又能流入大西洋**的格子座標。

  **範例 1：**
  ```
  輸入：heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]
  輸出：[[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]
  ```

  **範例 2：**
  ```
  輸入：heights = [[1]]
  輸出：[[0,0]]
  ```

  **限制條件：**
  - `m == heights.length`
  - `n == heights[r].length`
  - `1 <= m, n <= 200`
  - `0 <= heights[r][c] <= 10^5`
hints:
  - 正向思考（從陸地找能到達兩個海洋的格子）比較複雜。反向思考：從兩個海洋**逆流而上**，找出能被海水「逆向到達」的格子。
  - 分別對太平洋（左側 + 上側邊界）和大西洋（右側 + 下側邊界）做 BFS 或 DFS。逆流條件是：下一個格子的高度**大於等於**當前格子的高度。
  - 最終，對兩次搜尋都標記為可達的格子，就是答案。用兩個布林矩陣（pacific、atlantic）記錄可達性，取交集即可。
