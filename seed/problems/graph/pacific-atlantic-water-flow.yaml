title: Pacific Atlantic Water Flow
slug: pacific-atlantic-water-flow
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, dfs, bfs, matrix]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Queue
    relevance: 0.6
description: |
  There is an `m x n` rectangular island that borders both the **Pacific Ocean** and **Atlantic Ocean**. The Pacific Ocean touches the island's left and top edges, and the Atlantic Ocean touches the island's right and bottom edges.

  The island is partitioned into a grid of square cells. You are given an `m x n` integer matrix `heights` where `heights[r][c]` represents the height above sea level of the cell at coordinate `(r, c)`.

  Water can flow to adjacent cells (up, down, left, right) where the destination cell's height is **less than or equal to** the source cell's height. Water can also flow into the ocean from cells adjacent to the ocean.

  Return a 2D list of grid coordinates where water can flow to **both** the Pacific and Atlantic oceans.

  **Example 1:**
  ```
  Input: heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]
  Output: [[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]
  ```

  **Example 2:**
  ```
  Input: heights = [[1]]
  Output: [[0,0]]
  ```

  **Constraints:**
  - `m == heights.length`
  - `n == heights[r].length`
  - `1 <= m, n <= 200`
  - `0 <= heights[r][c] <= 10^5`
hints:
  - Thinking forward (finding cells that can reach both oceans directly) is complex. Think in reverse: start from both oceans and flow **uphill**, finding cells that can be "reverse-reached" by each ocean.
  - Run BFS or DFS separately from the Pacific (left + top borders) and the Atlantic (right + bottom borders). The reverse-flow condition is: the next cell's height must be **greater than or equal to** the current cell's height.
  - The answer is the intersection of cells reachable by both traversals. Use two boolean matrices (pacific, atlantic) to track reachability and take their intersection.
