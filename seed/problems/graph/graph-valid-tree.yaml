description: |
  Given `n` nodes labeled from `0` to `n - 1` and a list of undirected edges (each edge is a pair of nodes), write a function to check whether these edges make up a valid tree.

  **Hint:** A valid tree must satisfy two conditions:
  1. The graph is connected (all nodes are reachable from each other)
  2. The graph contains no cycle

  **Example 1:**
  ```
  Input: n = 5, edges = [[0,1],[0,2],[0,3],[1,4]]
  Output: true
  ```

  **Example 2:**
  ```
  Input: n = 5, edges = [[0,1],[1,2],[2,3],[1,3],[1,4]]
  Output: false
  Explanation: Edges [1,2],[2,3],[1,3] form a cycle.
  ```

  **Example 3:**
  ```
  Input: n = 4, edges = [[0,1],[2,3]]
  Output: false
  Explanation: The graph is not connected — nodes {0,1} and {2,3} are two separate groups.
  ```

  **Constraints:**
  - `1 <= n <= 2000`
  - `0 <= edges.length <= 5000`
  - `edges[i].length == 2`
  - `0 <= ai, bi < n`
  - `ai != bi`
  - There are no repeated edges
hints:
  - A tree with `n` nodes must have exactly `n-1` edges. As a quick first check: if `edges.length != n-1`, return `false` immediately.
  - Once the edge count is `n-1`, you only need to confirm the graph is connected. Use DFS or BFS from any node and check whether all `n` nodes are reachable.
  - An alternative is **Union-Find**: for each edge, perform a union operation; if the two nodes are already in the same set (same root), a cycle exists — return `false`. Finally confirm all nodes belong to one set.
