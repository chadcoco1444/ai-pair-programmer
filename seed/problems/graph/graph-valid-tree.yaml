title: Graph Valid Tree
slug: graph-valid-tree
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, union-find, bfs, dfs]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Queue
    relevance: 0.5
description: |
  給定 `n` 個節點（編號為 `0` 到 `n-1`）以及一個邊的列表 `edges`，其中 `edges[i] = [ai, bi]` 表示節點 `ai` 和 `bi` 之間有一條無向邊。

  請判斷這些節點和邊是否構成一棵**有效的樹**。

  **提示：** 有效的樹需要滿足兩個條件：
  1. 圖是連通的（所有節點相互可達）
  2. 圖中不存在環

  **範例 1：**
  ```
  輸入：n = 5, edges = [[0,1],[0,2],[0,3],[1,4]]
  輸出：true
  ```

  **範例 2：**
  ```
  輸入：n = 5, edges = [[0,1],[1,2],[2,3],[1,3],[1,4]]
  輸出：false
  解釋：邊 [1,2],[2,3],[1,3] 形成了一個環。
  ```

  **範例 3：**
  ```
  輸入：n = 4, edges = [[0,1],[2,3]]
  輸出：false
  解釋：圖不是連通的，節點 {0,1} 和 {2,3} 是兩個獨立的群組。
  ```

  **限制條件：**
  - `1 <= n <= 2000`
  - `0 <= edges.length <= 5000`
  - `edges[i].length == 2`
  - `0 <= ai, bi < n`
  - `ai != bi`
  - 沒有重複的邊
hints:
  - 一棵有 `n` 個節點的樹必定恰好有 `n-1` 條邊。因此，首先可以快速檢查：若 `edges.length != n-1`，直接回傳 `false`。
  - 滿足 `n-1` 條邊後，只需再確認圖是連通的即可。使用 DFS 或 BFS 從任意節點出發，看是否能訪問到所有 `n` 個節點。
  - 另一種方法是**聯合查找（Union-Find）**：對每條邊執行合併操作，若兩個節點已在同一集合（即找到的根相同），說明存在環，回傳 `false`；最後確認所有節點是否在同一集合中。
