description: |
  Given an unsorted array of integers `nums`, return the length of the longest consecutive elements sequence.

  You must write an algorithm that runs in **O(n)** time.

  **Example 1:**
  ```
  Input: nums = [100,4,200,1,3,2]
  Output: 4
  Explanation: The longest consecutive elements sequence is [1, 2, 3, 4]. Therefore its length is 4.
  ```

  **Example 2:**
  ```
  Input: nums = [0,3,7,2,5,8,4,6,0,1]
  Output: 9
  Explanation: The longest consecutive elements sequence is [0, 1, 2, 3, 4, 5, 6, 7, 8]. Therefore its length is 9.
  ```

  **Example 3:**
  ```
  Input: nums = []
  Output: 0
  ```

  **Constraints:**
  - `0 <= nums.length <= 10^5`
  - `-10^9 <= nums[i] <= 10^9`
hints:
  - Sorting makes it easy to find consecutive sequences, but sorting takes O(n log n) and does not meet the O(n) requirement. Think about how to use a Hash Table to check whether a number exists in O(1) time.
  - Store all numbers in a Hash Set. Iterate over each number `n`; only start counting a sequence from `n` when `n-1` is **not** in the set (so each sequence is counted exactly once).
  - Starting from `n`, keep checking whether `n+1`, `n+2`, ... are in the set until none is found, and record the maximum length. Each number is visited at most twice, giving an overall time complexity of O(n).
