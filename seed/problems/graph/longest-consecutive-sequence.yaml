title: Longest Consecutive Sequence
slug: longest-consecutive-sequence
difficulty: MEDIUM
category: ALGORITHM
tags: [array, hash-table, union-find]
concepts:
  - name: Array
    relevance: 0.7
  - name: Hash Table
    relevance: 1.0
description: |
  給定一個未排序的整數陣列 `nums`，請找出**最長連續元素序列**的長度。

  你必須設計一個時間複雜度為 **O(n)** 的演算法。

  **範例 1：**
  ```
  輸入：nums = [100,4,200,1,3,2]
  輸出：4
  解釋：最長連續序列為 [1, 2, 3, 4]，長度為 4。
  ```

  **範例 2：**
  ```
  輸入：nums = [0,3,7,2,5,8,4,6,0,1]
  輸出：9
  解釋：最長連續序列為 [0, 1, 2, 3, 4, 5, 6, 7, 8]，長度為 9。
  ```

  **範例 3：**
  ```
  輸入：nums = []
  輸出：0
  ```

  **限制條件：**
  - `0 <= nums.length <= 10^5`
  - `-10^9 <= nums[i] <= 10^9`
hints:
  - 排序後容易找到連續序列，但時間複雜度為 O(n log n)，無法滿足 O(n) 的要求。思考如何利用 Hash Table 在 O(1) 時間內判斷某個數字是否存在。
  - 將所有數字存入 Hash Set。遍歷每個數字 `n`，只有當 `n-1` **不在** Set 中時，才以 `n` 為序列的起點開始計算長度（這樣每個序列只會被計算一次）。
  - 從起點 `n` 開始，持續檢查 `n+1`、`n+2`... 是否在 Set 中，直到找不到為止，記錄最大長度。每個數字最多被訪問兩次，整體時間複雜度為 O(n)。
