    relevance: 0.5
  - name: Union Find
    relevance: 0.9
description: |
  Given `n` nodes labeled from `0` to `n - 1` and a list of undirected edges `edges`, where `edges[i] = [ai, bi]` indicates an undirected edge between nodes `ai` and `bi`, return the number of **connected components** in the graph.

  **Example 1:**
  ```
  Input: n = 5, edges = [[0,1],[1,2],[3,4]]
  Output: 2
  Explanation: {0,1,2} is one connected component and {3,4} is another.
  ```

  **Example 2:**
  ```
  Input: n = 5, edges = [[0,1],[1,2],[2,3],[3,4]]
  Output: 1
  Explanation: All nodes are connected to each other, so there is only 1 connected component.
  ```

  **Example 3:**
  ```
  Input: n = 5, edges = []
  Output: 5
  Explanation: There are no edges, so each node is its own connected component.
  ```

  **Constraints:**
  - `1 <= n <= 2000`
  - `0 <= edges.length <= 5000`
  - `edges[i].length == 2`
  - `0 <= ai, bi < n`
  - `ai != bi`
  - There are no repeated edges
hints:
  - Approach 1 (DFS/BFS): maintain a `visited` array. Iterate over all nodes; each time you encounter an unvisited node, increment the counter, then run DFS or BFS from that node to mark all reachable nodes as visited.
  - Approach 2 (Union-Find): initially each node is its own set, and set the counter to `n`. For each edge, perform a union; if the two nodes are not in the same set, merge them and decrement the counter. The final counter value is the answer.
  - Union-Find is a classic data structure for connectivity problems. Adding **path compression** and **union by rank** brings the time complexity close to O(n), making it very efficient.
