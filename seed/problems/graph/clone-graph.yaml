title: Clone Graph
slug: clone-graph
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, bfs, dfs, hash-table]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Hash Table
    relevance: 0.8
description: |
  給定一個無向連通圖中某節點的引用，請回傳該圖的**深拷貝（Deep Copy）**。

  圖中每個節點包含一個整數值 `val` 和一個鄰居節點列表 `neighbors`。

  ```
  class Node {
      public int val;
      public List<Node> neighbors;
  }
  ```

  圖以鄰接表形式表示，節點值從 `1` 到 `n`。

  **範例 1：**
  ```
  輸入：adjList = [[2,4],[1,3],[2,4],[1,3]]
  輸出：[[2,4],[1,3],[2,4],[1,3]]
  解釋：圖中共有 4 個節點，節點 1 的鄰居是 2 和 4，節點 2 的鄰居是 1 和 3，以此類推。
  ```

  **範例 2：**
  ```
  輸入：adjList = [[]]
  輸出：[[]]
  解釋：圖中只有一個節點，且該節點沒有鄰居。
  ```

  **範例 3：**
  ```
  輸入：adjList = []
  輸出：[]
  解釋：圖為空，回傳 null。
  ```

  **限制條件：**
  - 節點數量範圍為 `[0, 100]`
  - `1 <= Node.val <= 100`
  - 每個節點的值都是唯一的
  - 圖中不存在重複邊，也不存在自環
  - 圖是連通的
hints:
  - 深拷貝的關鍵挑戰是：如何避免重複複製同一個節點（圖中可能存在環）？使用 Hash Table 記錄「原始節點 → 複製節點」的映射關係。
  - 使用 BFS 或 DFS 遍歷原圖。每次遇到一個節點時，先檢查 Hash Table 中是否已存在對應的複製節點；若不存在，才建立新節點並加入 Hash Table。
  - 對每個節點，遍歷其所有鄰居，將對應的複製節點加入新節點的 neighbors 列表。若鄰居尚未被複製，遞迴（DFS）或加入佇列（BFS）處理。
