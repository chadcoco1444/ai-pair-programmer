title: Clone Graph
slug: clone-graph
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, bfs, dfs, hash-table]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Hash Table
    relevance: 0.8
description: |
  Given a reference of a node in a **connected** undirected graph, return a **deep copy** (clone) of the graph.

  Each node in the graph contains a value (`val`) and a list of its neighbors (`neighbors`).

  ```
  class Node {
      public int val;
      public List<Node> neighbors;
  }
  ```

  The graph is represented in the test case using an adjacency list. Node values are from `1` to `n`.

  **Example 1:**
  ```
  Input: adjList = [[2,4],[1,3],[2,4],[1,3]]
  Output: [[2,4],[1,3],[2,4],[1,3]]
  Explanation: There are 4 nodes in the graph. Node 1's neighbors are nodes 2 and 4. Node 2's neighbors are nodes 1 and 3, and so on.
  ```

  **Example 2:**
  ```
  Input: adjList = [[]]
  Output: [[]]
  Explanation: Note that the input contains one empty list. The graph consists of only one node with val = 1 and it does not have any neighbors.
  ```

  **Example 3:**
  ```
  Input: adjList = []
  Output: []
  Explanation: This an empty graph, it does not have any nodes.
  ```

  **Constraints:**
  - The number of nodes in the graph is in the range `[0, 100]`
  - `1 <= Node.val <= 100`
  - `Node.val` is unique for each node
  - There are no repeated edges and no self-loops in the graph
  - The graph is connected
hints:
  - The key challenge of deep copying is: how do you avoid copying the same node more than once (the graph may contain cycles)? Use a Hash Table to record the mapping from "original node -> copied node".
  - Traverse the original graph using BFS or DFS. Each time you encounter a node, first check if a corresponding copy already exists in the Hash Table; only create a new node and add it to the Hash Table if it does not.
  - For each node, iterate over all its neighbors and add the corresponding copied nodes to the new node's neighbors list. If a neighbor has not been copied yet, handle it recursively (DFS) or by adding it to the queue (BFS).
