title: Course Schedule
slug: course-schedule
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, topological-sort, bfs, dfs]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Queue
    relevance: 0.7
description: |
  你總共需要完成 `numCourses` 門課程，課程編號從 `0` 到 `numCourses - 1`。

  給定一個陣列 `prerequisites`，其中 `prerequisites[i] = [ai, bi]` 表示如果你想修課 `ai`，必須先修課 `bi`。

  請判斷你是否能夠完成所有課程？

  **範例 1：**
  ```
  輸入：numCourses = 2, prerequisites = [[1,0]]
  輸出：true
  解釋：共有 2 門課，要修課 1 需先修課 0，這是可以做到的。
  ```

  **範例 2：**
  ```
  輸入：numCourses = 2, prerequisites = [[1,0],[0,1]]
  輸出：false
  解釋：要修課 1 需先修課 0，要修課 0 也需先修課 1，形成循環依賴，無法完成。
  ```

  **範例 3：**
  ```
  輸入：numCourses = 4, prerequisites = [[1,0],[2,0],[3,1],[3,2]]
  輸出：true
  ```

  **限制條件：**
  - `1 <= numCourses <= 2000`
  - `0 <= prerequisites.length <= 5000`
  - `prerequisites[i].length == 2`
  - `0 <= ai, bi < numCourses`
  - `prerequisites[i]` 中所有元素對都是唯一的
hints:
  - 這道題本質上是**有向圖的環偵測**問題。將每門課程視為一個節點，先修關係視為有向邊，若圖中存在環，則無法完成所有課程。
  - 方法一（DFS）：使用三種狀態標記每個節點——未訪問、訪問中、已完成。若在 DFS 過程中遇到「訪問中」狀態的節點，說明存在環。
  - 方法二（BFS / 拓撲排序）：計算每個節點的入度，將所有入度為 0 的節點加入佇列，依序處理並減少鄰居的入度。若最終處理的節點數等於 `numCourses`，則無環。
