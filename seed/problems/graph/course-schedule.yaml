title: Course Schedule
slug: course-schedule
difficulty: MEDIUM
category: ALGORITHM
tags: [graph, topological-sort, bfs, dfs]
concepts:
  - name: Graph
    relevance: 1.0
  - name: Queue
    relevance: 0.7
description: |
  There are a total of `numCourses` courses you have to take, labeled from `0` to `numCourses - 1`.

  You are given an array `prerequisites` where `prerequisites[i] = [ai, bi]` indicates that you must take course `bi` first if you want to take course `ai`.

  Return `true` if you can finish all courses, otherwise return `false`.

  **Example 1:**
  ```
  Input: numCourses = 2, prerequisites = [[1,0]]
  Output: true
  Explanation: There are 2 courses. To take course 1 you must first take course 0. This is possible.
  ```

  **Example 2:**
  ```
  Input: numCourses = 2, prerequisites = [[1,0],[0,1]]
  Output: false
  Explanation: To take course 1 you must first take course 0, and to take course 0 you must first take course 1 — a circular dependency that makes it impossible.
  ```

  **Example 3:**
  ```
  Input: numCourses = 4, prerequisites = [[1,0],[2,0],[3,1],[3,2]]
  Output: true
  ```

  **Constraints:**
  - `1 <= numCourses <= 2000`
  - `0 <= prerequisites.length <= 5000`
  - `prerequisites[i].length == 2`
  - `0 <= ai, bi < numCourses`
  - All the pairs in `prerequisites[i]` are unique
hints:
  - This problem is essentially a **cycle detection in a directed graph**. Treat each course as a node and each prerequisite relationship as a directed edge. If the graph contains a cycle, it is impossible to finish all courses.
  - Approach 1 (DFS): use three states to mark each node — unvisited, visiting, and visited. If during DFS you encounter a node in the "visiting" state, a cycle exists.
  - Approach 2 (BFS / Topological Sort): compute the in-degree of each node, add all zero-in-degree nodes to a queue, process them in order while decrementing neighbors' in-degrees. If the total number of nodes processed equals `numCourses`, there is no cycle.
