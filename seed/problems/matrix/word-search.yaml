title: Word Search
slug: word-search
difficulty: MEDIUM
category: ALGORITHM
tags: [array, matrix, backtracking, dfs]
concepts:
  - name: Array
    relevance: 0.7
  - name: Backtracking
    relevance: 1.0
description: |
  Given an `m x n` grid of characters `board` and a string `word`, return `true` if `word` exists in the grid.

  The word must be constructed from letters of sequentially adjacent cells, where adjacent cells are horizontally or vertically neighboring. The same cell **may not be used more than once**.

  **Example 1:**
  ```
  Input: board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "ABCCED"
  Output: true
  ```

  **Example 2:**
  ```
  Input: board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "SEE"
  Output: true
  ```

  **Example 3:**
  ```
  Input: board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "ABCB"
  Output: false
  ```

  **Constraints:**
  - `m == board.length`
  - `n == board[i].length`
  - `1 <= m, n <= 6`
  - `1 <= word.length <= 15`
  - `board` and `word` consist of only uppercase and lowercase English letters
hints:
  - Use Depth-First Search (DFS) with Backtracking: try every cell that matches `word[0]` as a starting point, then recursively explore all four directions.
  - During DFS, to mark a cell as visited, temporarily replace its value with a special character (e.g., `'#'`), and restore the original value after recursion returns. This avoids the need for a separate visited array.
  - Pruning: if the current character does not match the corresponding character in `word`, return false immediately. If the index equals `word.length`, all characters have been matched — return true. Always check that row and column indices are within bounds.
