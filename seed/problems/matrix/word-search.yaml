title: Word Search
slug: word-search
difficulty: MEDIUM
category: ALGORITHM
tags: [array, matrix, backtracking, dfs]
concepts:
  - name: Array
    relevance: 0.7
  - name: Backtracking
    relevance: 1.0
description: |
  給定一個 `m x n` 的字符網格 `board` 和一個字串 `word`，請判斷 `word` 是否存在於網格中。

  單詞必須由相鄰格子中的字母按順序構成，其中「相鄰」格子是指水平或垂直方向相鄰的格子。同一個格子中的字母**不允許被重複使用**。

  **範例 1：**
  ```
  輸入：board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "ABCCED"
  輸出：true
  ```

  **範例 2：**
  ```
  輸入：board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "SEE"
  輸出：true
  ```

  **範例 3：**
  ```
  輸入：board = [["A","B","C","E"],["S","F","C","S"],["A","D","E","E"]], word = "ABCB"
  輸出：false
  ```

  **限制條件：**
  - `m == board.length`
  - `n == board[i].length`
  - `1 <= m, n <= 6`
  - `1 <= word.length <= 15`
  - `board` 和 `word` 只包含大寫和小寫英文字母
hints:
  - 使用深度優先搜尋（DFS）配合回溯（Backtracking）：對網格中每個與 `word[0]` 相符的格子都嘗試作為起始點，然後向四個方向遞迴探索。
  - 在 DFS 過程中，為了標記已訪問的格子，可以將當前格子的值暫時替換為一個特殊字符（例如 `'#'`），遞迴返回後再恢復原值，這樣可以不使用額外的 visited 陣列。
  - 剪枝優化：若當前字符與 `word` 中對應位置的字符不符，立即返回 false；若索引等於 `word.length`，表示已成功匹配所有字符，返回 true。注意邊界條件：行列索引需在有效範圍內。
