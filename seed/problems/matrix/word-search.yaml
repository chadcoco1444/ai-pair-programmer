testCases:
  - input: "board = [[\"A\",\"B\",\"C\",\"E\"],[\"S\",\"F\",\"C\",\"S\"],[\"A\",\"D\",\"E\",\"E\"]], word = \"ABCCED\""
    expected: "true"
    isHidden: false
    isKiller: false
  - input: "board = [[\"A\",\"B\",\"C\",\"E\"],[\"S\",\"F\",\"C\",\"S\"],[\"A\",\"D\",\"E\",\"E\"]], word = \"SEE\""
    expected: "true"
    isHidden: false
    isKiller: false
  - input: "board = [[\"A\",\"B\",\"C\",\"E\"],[\"S\",\"F\",\"C\",\"S\"],[\"A\",\"D\",\"E\",\"E\"]], word = \"ABCB\""
    expected: "false"
    isHidden: false
    isKiller: false
  - input: "board = [[\"A\",\"B\"],[\"C\",\"D\"]], word = \"ABDC\""
