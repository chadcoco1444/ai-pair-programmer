description: |
  Given an `n x n` 2D matrix `matrix` representing an image, rotate the image **in-place** by 90 degrees clockwise.

  Note: You **must not** use any extra matrix space.

  **Example 1:**
  ```
  Input: matrix = [[1,2,3],[4,5,6],[7,8,9]]
  Output: [[7,4,1],[8,5,2],[9,6,3]]
  ```

  **Example 2:**
  ```
  Input: matrix = [[5,1,9,11],[2,4,8,10],[13,3,6,7],[15,14,12,16]]
  Output: [[15,13,2,5],[14,3,4,1],[12,6,8,9],[16,7,10,11]]
  ```

  **Constraints:**
  - `n == matrix.length == matrix[i].length`
  - `1 <= n <= 20`
  - `-1000 <= matrix[i][j] <= 1000`
hints:
  - A 90-degree clockwise rotation can be decomposed into two steps: (1) **Transpose** the matrix — swap `matrix[i][j]` with `matrix[j][i]`; (2) **Reverse** each row horizontally.
  - When transposing, only iterate over the upper triangle (`j > i`) to avoid swapping twice. When reversing, use two pointers moving inward from both ends of each row.
  - Alternatively, rotate four corresponding elements simultaneously (layer by layer from outside in), but the transpose + reverse approach is more intuitive and easier to remember.
