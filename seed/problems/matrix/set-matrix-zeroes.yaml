title: Set Matrix Zeroes
slug: set-matrix-zeroes
difficulty: MEDIUM
category: ALGORITHM
tags: [array, matrix, hash-table]
concepts:
  - name: Array
    relevance: 0.9
  - name: Hash Table
    relevance: 0.8
description: |
  給定一個 `m x n` 的整數矩陣 `matrix`，如果某個元素為 `0`，請將它所在的**整行**和**整列**都設定為 `0`，並**原地（in-place）**修改矩陣。

  **範例 1：**
  ```
  輸入：matrix = [[1,1,1],[1,0,1],[1,1,1]]
  輸出：[[1,0,1],[0,0,0],[1,0,1]]
  ```

  **範例 2：**
  ```
  輸入：matrix = [[0,1,2,0],[3,4,5,2],[1,3,1,5]]
  輸出：[[0,0,0,0],[0,4,5,0],[0,3,1,0]]
  ```

  **限制條件：**
  - `m == matrix.length`
  - `n == matrix[0].length`
  - `1 <= m, n <= 200`
  - `-2^31 <= matrix[i][j] <= 2^31 - 1`

  **進階：**
  - 簡單的做法是使用 O(m + n) 的額外空間，你能用 O(1) 的額外空間解決嗎？
hints:
  - 直觀做法：先用兩個 Set 記錄哪些行和列需要置零，然後再遍歷一次矩陣執行置零操作。這需要 O(m + n) 的額外空間。
  - O(1) 空間解法：利用矩陣的第一行和第一列作為標記陣列。先判斷第一行和第一列本身是否含有 0（用兩個布林值記錄），然後遍歷矩陣內部，用 `matrix[i][0]` 和 `matrix[0][j]` 標記對應行列是否需要置零。
  - 執行順序很重要：先根據第一行/列的標記來處理矩陣內部元素（行 1 到 m-1，列 1 到 n-1），最後再單獨處理第一行和第一列本身，避免標記被提前覆蓋。
