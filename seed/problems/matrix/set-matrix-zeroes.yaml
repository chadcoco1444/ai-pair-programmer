description: |
  Given an `m x n` integer matrix `matrix`, if an element is `0`, set its entire **row** and **column** to `0`s. You must do this **in-place**.

  **Example 1:**
  ```
  Input: matrix = [[1,1,1],[1,0,1],[1,1,1]]
  Output: [[1,0,1],[0,0,0],[1,0,1]]
  ```

  **Example 2:**
  ```
  Input: matrix = [[0,1,2,0],[3,4,5,2],[1,3,1,5]]
  Output: [[0,0,0,0],[0,4,5,0],[0,3,1,0]]
  ```

  **Constraints:**
  - `m == matrix.length`
  - `n == matrix[0].length`
  - `1 <= m, n <= 200`
  - `-2^31 <= matrix[i][j] <= 2^31 - 1`

  **Follow-up:**
  - A straightforward solution uses O(m + n) extra space. Can you come up with a solution using only O(1) extra space?
hints:
  - Straightforward approach: use two Sets to record which rows and columns need to be zeroed, then iterate through the matrix again to apply the zeroing. This uses O(m + n) extra space.
  - O(1) space solution: use the first row and first column of the matrix itself as marker arrays. First check whether the first row and first column already contain zeros (store in two boolean variables). Then scan the rest of the matrix and mark `matrix[i][0]` and `matrix[0][j]` to indicate which rows and columns need zeroing.
  - Execution order matters: first process the inner elements (rows 1 to m-1, columns 1 to n-1) based on the first row/column markers, then handle the first row and first column themselves last to avoid overwriting markers prematurely.
