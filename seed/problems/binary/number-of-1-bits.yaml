description: |
  Write a function that takes the binary representation of a positive integer and returns the number of set bits it has (also known as the **Hamming weight**).

  **Example 1:**
  ```
  Input: n = 00000000000000000000000000001011
  Output: 3
  Explanation: The input binary string has a total of three set bits.
  ```

  **Example 2:**
  ```
  Input: n = 00000000000000000000000010000000
  Output: 1
  Explanation: The input binary string has a total of one set bit.
  ```

  **Example 3:**
  ```
  Input: n = 11111111111111111111111111111101
  Output: 31
  Explanation: The input binary string has a total of thirty one set bits.
  ```

  **Constraints:**
  - The input must be a **binary string** of length `32`.

hints:
  - You can use `n & 1` to check if the lowest bit is 1, then right-shift `n` by one, and repeat 32 times.
  - A more efficient approach: use `n & (n-1)` to clear the lowest set bit each time, and loop until `n` is 0.
  - You can also convert the integer to a binary string and count the number of '1' characters.

