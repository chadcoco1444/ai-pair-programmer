title: Number of 1 Bits
slug: number-of-1-bits
difficulty: EASY
category: ALGORITHM
tags: [bit-manipulation]
concepts:
  - name: Dynamic Programming
    relevance: 0.1
  - name: Greedy
    relevance: 0.2
description: |
  编写一个函数，输入是一个无符号整数（以二进制字符串形式给出），返回其二进制表达式中设置位（即 `'1'` 位）的数量，也称为**汉明重量**。

  **示例 1：**
  ```
  输入：n = 00000000000000000000000000001011
  输出：3
  解释：输入的二进制串中，共有三位为 '1'。
  ```

  **示例 2：**
  ```
  输入：n = 00000000000000000000000010000000
  输出：1
  解释：输入的二进制串中，共有一位为 '1'。
  ```

  **示例 3：**
  ```
  输入：n = 11111111111111111111111111111101
  输出：31
  解释：输入的二进制串中，共有三十一位为 '1'。
  ```

  **约束条件：**
  - 输入必须是长度为 32 的**二进制字符串**。

hints:
  - 可以使用 `n & 1` 检查最低位是否为 1，然后将 n 右移一位，重复此过程 32 次。
  - 更高效的方法：使用 `n & (n-1)` 每次可以消去最低位的 1，循环直到 n 为 0。
  - 也可以直接将整数转为二进制字符串，统计字符 '1' 的个数。

