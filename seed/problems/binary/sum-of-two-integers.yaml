description: |
  Given two integers `a` and `b`, return the sum of the two integers **without** using the operators `+` and `-`.

  **Example 1:**
  ```
  Input: a = 1, b = 2
  Output: 3
  ```

  **Example 2:**
  ```
  Input: a = 2, b = 3
  Output: 5
  ```

  **Constraints:**
  - `-1000 <= a, b <= 1000`

hints:
  - Consider using bit manipulation to simulate addition. `a XOR b` gives the addition result without considering the carry.
  - Use `(a AND b) << 1` to compute the carry, then add the carry to the previous result. Repeat this process until there is no more carry.
  - Be careful to handle negative numbers. In Python, you need to use a mask to handle the two's complement representation.

