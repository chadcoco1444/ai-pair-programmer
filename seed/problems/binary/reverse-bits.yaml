description: |
  Reverse bits of a given 32-bit unsigned integer.

  **Note:**
  - Note that in some languages, such as Java, there is no unsigned integer type. In this case, both input and output will be given as a signed integer type. They should not affect your implementation, since the integer's internal binary representation is the same whether it is signed or unsigned.
  - In Java, the compiler represents the signed integers using 2's complement notation. Therefore, in **Example 2** above, the input represents the signed integer `-3` and the output represents the signed integer `-1073741825`.

  **Example 1:**
  ```
  Input: n = 00000010100101000001111010011100
  Output: 964176192 (00111001011110000010100101000000)
  Explanation: The input binary string 00000010100101000001111010011100 represents the unsigned integer 43261596,
               so return 964176192 which its binary representation is 00111001011110000010100101000000.
  ```

  **Example 2:**
  ```
  Input: n = 11111111111111111111111111111101
  Output: 3221225471 (10111111111111111111111111111111)
  Explanation: The input binary string 11111111111111111111111111111101 represents the unsigned integer 4294967293,
               so return 3221225471 which its binary representation is 10111111111111111111111111111111.
  ```

  **Constraints:**
  - The input must be a **binary string** of length `32`.

hints:
  - Process bit by bit: extract the lowest bit of `n` (using `n & 1`), left-shift the result and add this bit, then right-shift `n`. Repeat 32 times.
  - Initialize result to 0, loop 32 times: left-shift `result` by one, add the lowest bit of `n` to `result`, then right-shift `n` by one.
  - Note that in Python, you need to apply a mask `0xFFFFFFFF` to ensure the result is a 32-bit unsigned integer and avoid issues with negative numbers.

