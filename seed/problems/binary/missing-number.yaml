description: |
  Given an array `nums` containing `n` distinct numbers in the range `[0, n]`, return the only number in the range that is missing from the array.

  **Example 1:**
  ```
  Input: nums = [3,0,1]
  Output: 2
  Explanation: n = 3 since there are 3 numbers, so all numbers are in the range [0,3]. 2 is the missing number since it does not appear in nums.
  ```

  **Example 2:**
  ```
  Input: nums = [0,1]
  Output: 2
  Explanation: n = 2 since there are 2 numbers, so all numbers are in the range [0,2]. 2 is the missing number since it does not appear in nums.
  ```

  **Example 3:**
  ```
  Input: nums = [9,6,4,2,3,5,7,0,1]
  Output: 8
  Explanation: n = 9 since there are 9 numbers, so all numbers are in the range [0,9]. 8 is the missing number since it does not appear in nums.
  ```

  **Constraints:**
  - `n == nums.length`
  - `1 <= n <= 10^4`
  - `0 <= nums[i] <= n`
  - All the numbers of `nums` are unique.

hints:
  - You can use the math approach: the expected sum of `0` to `n` is `n*(n+1)/2`. Subtract the actual sum of the array from this to get the missing number.
  - You can also use bit manipulation: XOR all elements in the array with every index from `0` to `n`. Duplicate numbers cancel out, leaving only the missing number.
  - Alternatively, sort the array and check each position to see if its value equals its index. The first mismatch is the answer.

