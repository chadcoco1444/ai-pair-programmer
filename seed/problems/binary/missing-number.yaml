description: |
  给定一个包含 `n` 个不同数字的数组 `nums`，这些数字处于 `[0, n]` 范围内，找出 `[0, n]` 这个范围内没有出现在数组中的那个数字。

  **示例 1：**
  ```
  输入：nums = [3,0,1]
  输出：2
  解释：n = 3，因为有 3 个数字，所以所有的数字都在范围 [0,3] 内。2 是缺失的数字，因为它没有出现在 nums 中。
  ```

  **示例 2：**
  ```
  输入：nums = [0,1]
  输出：2
  解释：n = 2，因为有 2 个数字，所以所有的数字都在范围 [0,2] 内。2 是缺失的数字，因为它没有出现在 nums 中。
  ```

  **示例 3：**
  ```
  输入：nums = [9,6,4,2,3,5,7,0,1]
  输出：8
  解释：n = 9，因为有 9 个数字，所以所有的数字都在范围 [0,9] 内。8 是缺失的数字，因为它没有出现在 nums 中。
  ```

  **约束条件：**
  - `n == nums.length`
  - `1 <= n <= 10^4`
  - `0 <= nums[i] <= n`
  - `nums` 中的所有数字都是唯一的。

hints:
  - 可以使用数学方法：`0` 到 `n` 的总和为 `n*(n+1)/2`，用这个值减去数组中所有元素的和，得到的就是缺失的数字。
  - 也可以使用位运算：将数组中所有元素与 `0` 到 `n` 中每个索引做 XOR 运算，重复的数字会互相抵消，剩下的就是缺失的数字。
  - 还可以对数组排序后，逐一检查每个位置的值是否等于其索引，第一个不匹配的索引就是答案。

