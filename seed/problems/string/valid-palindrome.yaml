title: Valid Palindrome
slug: valid-palindrome
difficulty: EASY
category: ALGORITHM
tags: [string, two-pointer]
concepts:
  - name: Two Pointer
    relevance: 0.95
description: |
  如果在将所有大写字母转换为小写字母、并移除所有非字母数字字符之后，短语正着读和反着读都相同，则可以认为该短语是一个**回文串**。

  字母和数字都属于字母数字字符。

  给定一个字符串 `s`，如果它是回文串，返回 `true`；否则返回 `false`。

  **示例 1：**
  ```
  输入：s = "A man, a plan, a canal: Panama"
  输出：true
  解释："amanaplanacanalpanama" 是回文串。
  ```

  **示例 2：**
  ```
  输入：s = "race a car"
  输出：false
  解释："raceacar" 不是回文串。
  ```

  **示例 3：**
  ```
  输入：s = " "
  输出：true
  解释：在移除非字母数字字符后，s 为空字符串 ""，空字符串正着读和反着读都相同，因此是回文串。
  ```

  **约束条件：**
  - `1 <= s.length <= 2 * 10^5`
  - `s` 仅由可打印的 ASCII 字符组成
hints:
  - 使用双指针，左指针从字符串头部开始，右指针从字符串尾部开始，向中间移动。
  - 跳过非字母数字字符，将字母统一转为小写后比较左右指针对应的字符是否相同。
  - 若在任意位置左右字符不匹配，则返回 false；若左指针超过右指针则说明是回文串，返回 true。
