description: |
  A phrase is a **palindrome** if, after converting all uppercase letters to lowercase and removing all non-alphanumeric characters, it reads the same forward and backward.

  Alphanumeric characters include both letters and digits.

  Given a string `s`, return `true` if it is a palindrome, or `false` otherwise.

  **Example 1:**
  ```
  Input: s = "A man, a plan, a canal: Panama"
  Output: true
  Explanation: "amanaplanacanalpanama" is a palindrome.
  ```

  **Example 2:**
  ```
  Input: s = "race a car"
  Output: false
  Explanation: "raceacar" is not a palindrome.
  ```

  **Example 3:**
  ```
  Input: s = " "
  Output: true
  Explanation: After removing non-alphanumeric characters, s becomes the empty string "". An empty string reads the same forward and backward, so it is a palindrome.
  ```

  **Constraints:**
  - `1 <= s.length <= 2 * 10^5`
  - `s` consists only of printable ASCII characters
hints:
  - Use two pointers: a left pointer starting at the beginning of the string and a right pointer starting at the end, moving toward the middle.
  - Skip non-alphanumeric characters, convert letters to lowercase, then compare the characters at the left and right pointers.
  - If the characters at any position do not match, return false. If the left pointer crosses the right pointer, the string is a palindrome — return true.
