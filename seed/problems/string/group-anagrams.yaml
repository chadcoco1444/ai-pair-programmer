description: |
  Given an array of strings `strs`, group the anagrams together and return the result list in any order.

  An **anagram** is a word or phrase formed by rearranging the letters of another word or phrase, using all the original letters exactly once.

  **Example 1:**
  ```
  Input: strs = ["eat","tea","tan","ate","nat","bat"]
  Output: [["bat"],["nat","tan"],["ate","eat","tea"]]
  ```

  **Example 2:**
  ```
  Input: strs = [""]
  Output: [[""]]
  ```

  **Example 3:**
  ```
  Input: strs = ["a"]
  Output: [["a"]]
  ```

  **Constraints:**
  - `1 <= strs.length <= 10^4`
  - `0 <= strs[i].length <= 100`
  - `strs[i]` consists of lowercase English letters only
hints:
  - Anagrams produce the same string when sorted. Use the sorted string as a hash map key to group original strings into the same bucket.
  - Alternatively, use a character count array of length 26 (converted to a tuple or string) as the hash map key. This avoids sorting and reduces time complexity to O(n * k), where k is the maximum string length.
  - Iterate over all strings, generate the key for each, insert into the hash map, and finally return all values in the map as a list.
