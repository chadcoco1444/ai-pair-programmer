description: |
  Given a string `s`, return the **number of palindromic substrings** in it.

  A **palindrome** is a string that reads the same forward and backward. A **substring** is a contiguous sequence of characters within the string.

  **Example 1:**
  ```
  Input: s = "abc"
  Output: 3
  Explanation: The three palindromic substrings are "a", "b", "c".
  ```

  **Example 2:**
  ```
  Input: s = "aaa"
  Output: 6
  Explanation: The six palindromic substrings are "a", "a", "a", "aa", "aa", "aaa".
  ```

  **Constraints:**
  - `1 <= s.length <= 1000`
  - `s` consists of only lowercase English letters
hints:
  - Use the expand-around-center technique: for each character and each gap between adjacent characters, expand outward. Every successful expansion (still a palindrome) increments the count by one.
  - There are 2n-1 centers to check (n odd-length centers + n-1 even-length centers). Each expansion takes O(n) time, giving an overall time complexity of O(n²).
  - You can also use dynamic programming: define dp[i][j] as whether s[i..j] is a palindromic substring. Use dp[i+1][j-1] to derive dp[i][j], then count all dp[i][j] that are true.
