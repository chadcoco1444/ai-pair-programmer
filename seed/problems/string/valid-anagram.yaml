description: |
  Given two strings `s` and `t`, write a function to determine if `t` is an anagram of `s`.

  An **anagram** is a word formed by rearranging the letters of another word, using all the original letters exactly once.

  **Example 1:**
  ```
  Input: s = "anagram", t = "nagaram"
  Output: true
  ```

  **Example 2:**
  ```
  Input: s = "rat", t = "car"
  Output: false
  ```

  **Example 3:**
  ```
  Input: s = "ab", t = "a"
  Output: false
  ```

  **Constraints:**
  - `1 <= s.length, t.length <= 5 * 10^4`
  - `s` and `t` consist of lowercase English letters only

  **Follow-up:** What if the input strings contain Unicode characters? Can you adapt your solution to handle that case?
hints:
  - If the two strings have different lengths, they cannot be anagrams — return false immediately.
  - Use an array of length 26 (or a hash map) to count character frequencies in `s`, then iterate through `t` and decrement the count for each character. If any count goes negative, return false.
  - Alternatively, sort both strings and compare — but that is O(n log n). Using a hash map achieves O(n) time complexity.
