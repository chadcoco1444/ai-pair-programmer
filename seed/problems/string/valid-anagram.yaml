title: Valid Anagram
slug: valid-anagram
difficulty: EASY
category: ALGORITHM
tags: [string, hash-table, sorting]
concepts:
  - name: Hash Table
    relevance: 0.9
  - name: Array
    relevance: 0.6
description: |
  给定两个字符串 `s` 和 `t`，编写一个函数来判断 `t` 是否是 `s` 的字母异位词（Anagram）。

  **字母异位词**是指由相同字母重新排列组合而成的字符串，字母种类和数量完全相同。

  **示例 1：**
  ```
  输入：s = "anagram", t = "nagaram"
  输出：true
  ```

  **示例 2：**
  ```
  输入：s = "rat", t = "car"
  输出：false
  ```

  **示例 3：**
  ```
  输入：s = "ab", t = "a"
  输出：false
  ```

  **约束条件：**
  - `1 <= s.length, t.length <= 5 * 10^4`
  - `s` 和 `t` 仅包含小写英文字母

  **进阶：** 如果输入字符串包含 Unicode 字符怎么办？你能否调整你的解法来应对这种情况？
hints:
  - 两个字符串如果长度不同，则必然不是字母异位词，可以直接返回 false。
  - 使用一个长度为 26 的数组（或哈希表）统计 s 中每个字符的出现次数，然后遍历 t 减去对应字符的计数，若出现负数则返回 false。
  - 另一种方法是将两个字符串分别排序后比较是否相等，但时间复杂度为 O(n log n)；使用哈希表可达到 O(n) 的时间复杂度。
