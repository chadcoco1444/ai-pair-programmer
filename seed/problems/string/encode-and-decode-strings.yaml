testCases:
  - input: '["Hello","World"]'
    expected: '["Hello","World"]'
    isHidden: false
    isKiller: false
  - input: '[""]'
    expected: '[""]'
    isHidden: false
    isKiller: false
  - input: '["Hello","#World","#"]'
    expected: '["Hello","#World","#"]'
    isHidden: false
    isKiller: false
  - input: '["we","say",":","yes"]'
    expected: '["we","say",":","yes"]'
    isHidden: true
    isKiller: false
  - input: '["4#abc","5#hello","0#","contains spaces and\nnewlines"]'
    expected: '["4#abc","5#hello","0#","contains spaces and\nnewlines"]'
    isHidden: true
    isKiller: true
