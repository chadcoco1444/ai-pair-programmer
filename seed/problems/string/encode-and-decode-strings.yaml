title: Encode and Decode Strings
slug: encode-and-decode-strings
difficulty: MEDIUM
category: ALGORITHM
tags: [string, design]
concepts:
  - name: Array
    relevance: 0.6
description: |
  Design an algorithm to **encode** a list of strings into a single string, and **decode** the encoded string back into the original list of strings.

  The codec must satisfy: machine A encodes a list of strings into a single string and sends it over the network; machine B receives the string and can correctly decode it to restore the original list.

  The encode/decode scheme may not rely on any external library or serialization mechanism.

  **Example 1:**
  ```
  Input: strs = ["Hello","World"]
  Encoded: (some intermediate format)
  Decoded: ["Hello","World"]
  Output: ["Hello","World"]
  ```

  **Example 2:**
  ```
  Input: strs = [""]
  Output: [""]
  ```

  **Example 3:**
  ```
  Input: strs = ["Hello","#World","#"]
  Output: ["Hello","#World","#"]
  Explanation: The scheme must handle strings that contain special characters.
  ```

  **Constraints:**
  - `1 <= strs.length <= 200`
  - `0 <= strs[i].length <= 200`
  - `strs[i]` contains any of the 256 ASCII characters except `','`
hints:
  - "Simply joining strings with a delimiter is insufficient because strings may contain that delimiter. A robust approach is length-prefix encoding: encode each string as <length>#<string content>."
  - "To encode: for each string s, append str(len(s)) + '#' + s to the result. To decode: read the number before '#' to get the length, then extract that many characters following it."
  - "When decoding, maintain a pointer i. Find the next '#', parse the number before it as length L, then read L characters after '#' as the original string. Repeat until the entire encoded string is consumed."
