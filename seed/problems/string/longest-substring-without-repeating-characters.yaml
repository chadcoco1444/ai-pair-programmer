description: |
  Given a string `s`, find the length of the **longest substring** without repeating characters.

  **Example 1:**
  ```
  Input: s = "abcabcbb"
  Output: 3
  Explanation: The longest substring is "abc", with length 3.
  ```

  **Example 2:**
  ```
  Input: s = "bbbbb"
  Output: 1
  Explanation: The longest substring is "b", with length 1.
  ```

  **Example 3:**
  ```
  Input: s = "pwwkew"
  Output: 3
  Explanation: The longest substring is "wke", with length 3. Note that the answer must be a substring — "pwke" is a subsequence, not a substring.
  ```

  **Constraints:**
  - `0 <= s.length <= 5 * 10^4`
  - `s` consists of English letters, digits, symbols, and spaces
hints:
  - Use the sliding window technique, maintaining a left and right pointer such that the window always contains no duplicate characters.
  - Use a hash map to record the most recent index of each character. When a duplicate character is encountered, move the left pointer to one position past that character's last occurrence.
  - After advancing the right pointer each time, update the current window length and compare it with the running maximum to track the answer.
