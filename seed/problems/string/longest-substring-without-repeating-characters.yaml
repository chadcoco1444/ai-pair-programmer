title: Longest Substring Without Repeating Characters
slug: longest-substring-without-repeating-characters
difficulty: MEDIUM
category: ALGORITHM
tags: [string, sliding-window, hash-table]
concepts:
  - name: Sliding Window
    relevance: 0.95
  - name: Hash Table
    relevance: 0.8
description: |
  给定一个字符串 `s`，请找出其中不含重复字符的**最长子串**的长度。

  **示例 1：**
  ```
  输入：s = "abcabcbb"
  输出：3
  解释：最长子串为 "abc"，长度为 3。
  ```

  **示例 2：**
  ```
  输入：s = "bbbbb"
  输出：1
  解释：最长子串为 "b"，长度为 1。
  ```

  **示例 3：**
  ```
  输入：s = "pwwkew"
  输出：3
  解释：最长子串为 "wke"，长度为 3。注意答案必须是子串，"pwke" 是子序列而非子串。
  ```

  **约束条件：**
  - `0 <= s.length <= 5 * 10^4`
  - `s` 由英文字母、数字、符号和空格组成
hints:
  - 使用滑动窗口技术，维护一个左指针和右指针，窗口内保证没有重复字符。
  - 用哈希表记录每个字符最近一次出现的位置，当遇到重复字符时，将左指针移动到该字符上次出现位置的下一位。
  - 每次移动右指针后，更新当前窗口长度，并与历史最大值比较，取最大值作为答案。
