    relevance: 0.95
  - name: Hash Table
    relevance: 0.7
description: |
  Given a string `s` consisting of only uppercase English letters and an integer `k`, you can choose any character in the string and change it to any other uppercase English character. This operation can be performed at most `k` times.

  Return the length of the longest substring containing the same letter you can get after performing the above operations.

  **Example 1:**
  ```
  Input: s = "ABAB", k = 2
  Output: 4
  Explanation: Replace the two 'A's with 'B's, or the two 'B's with 'A's, to get "BBBB" or "AAAA", length 4.
  ```

  **Example 2:**
  ```
  Input: s = "AABABBA", k = 1
  Output: 4
  Explanation: Replacing the middle 'A' gives "AABBBBA", where the longest run of the same character is "BBBB", length 4.
  ```

  **Constraints:**
  - `1 <= s.length <= 10^5`
  - `s` consists of only uppercase English letters
  - `0 <= k <= s.length`
hints:
  - Use a sliding window. The number of replacements needed within the window equals the window length minus the frequency of the most common character in the window.
  - When the number of characters that need to be replaced exceeds `k`, shrink the window by advancing the left pointer; otherwise expand it.
  - Track the highest frequency of any single character in the window (`maxCount`). When `windowSize - maxCount > k`, shrink the window. You do not need to decrease `maxCount` when shrinking — this does not affect the correctness of the final answer.
