description: |
  Given strings `s` and `t`, return the **minimum window substring** of `s` such that every character in `t` (including duplicates) is included in the window. If there is no such substring, return the empty string `""`.

  Note: for duplicate characters in `t`, the window must contain at least as many occurrences of that character as `t` does.

  **Example 1:**
  ```
  Input: s = "ADOBECODEBANC", t = "ABC"
  Output: "BANC"
  Explanation: The minimum window "BANC" contains all characters 'A', 'B', and 'C' from t.
  ```

  **Example 2:**
  ```
  Input: s = "a", t = "a"
  Output: "a"
  ```

  **Example 3:**
  ```
  Input: s = "a", t = "aa"
  Output: ""
  Explanation: t has two 'a's but s only has one, so the condition cannot be satisfied.
  ```

  **Constraints:**
  - `1 <= s.length, t.length <= 10^5`
  - `s` and `t` consist of English letters
  - The answer is unique
hints:
  - Use two hash maps — one for the required character counts from `t`, one for current window counts — plus a `formed` variable tracking how many distinct characters in the window currently meet their required frequency.
  - Expand the window by advancing the right pointer until all characters in `t` are covered, then contract the window by moving the left pointer to find a shorter valid window, updating the answer as you go.
  - When a character's count in the window reaches the required amount from `t`, increment `formed`. When the left pointer removes a character causing its count to fall below the requirement, decrement `formed`. This efficiently tracks whether the window is valid.
