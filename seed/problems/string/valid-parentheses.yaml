title: Valid Parentheses
slug: valid-parentheses
difficulty: EASY
category: ALGORITHM
tags: [string, stack]
concepts:
  - name: Stack
    relevance: 0.95
description: |
  Given a string `s` containing only the characters `'('`, `')'`, `'{'`, `'}'`, `'['`, and `']'`, determine if the input string is valid.

  An input string is valid if:
  1. Open brackets must be closed by the same type of bracket.
  2. Open brackets must be closed in the correct order.
  3. Every close bracket has a corresponding open bracket of the same type.

  **Example 1:**
  ```
  Input: s = "()"
  Output: true
  ```

  **Example 2:**
  ```
  Input: s = "()[]{}"
  Output: true
  ```

  **Example 3:**
  ```
  Input: s = "(]"
  Output: false
  ```

  **Example 4:**
  ```
  Input: s = "([)]"
  Output: false
  ```

  **Constraints:**
  - `1 <= s.length <= 10^4`
  - `s` consists of bracket characters only: `'()[]{}'`
hints:
  - Use a Stack data structure. Push every opening bracket onto the stack.
  - When a closing bracket is encountered, check whether the top of the stack is the matching opening bracket. If it is, pop the stack; otherwise return false. If the stack is empty when a closing bracket is encountered, also return false.
  - After iterating through the entire string, if the stack is empty all brackets have been correctly matched — return true. Otherwise return false (there are unmatched opening brackets remaining).
