description: |
  Given a string `s`, return the **longest palindromic substring** in `s`.

  A **palindrome** is a string that reads the same forward and backward.

  **Example 1:**
  ```
  Input: s = "babad"
  Output: "bab"
  Explanation: "aba" is also a valid answer.
  ```

  **Example 2:**
  ```
  Input: s = "cbbd"
  Output: "bb"
  ```

  **Example 3:**
  ```
  Input: s = "a"
  Output: "a"
  ```

  **Constraints:**
  - `1 <= s.length <= 1000`
  - `s` consists of only digits and English letters
hints:
  - Use the "expand around center" technique: for each character (and each gap between adjacent characters), expand outward from the center to check if a palindrome forms. Time complexity is O(n²).
  - For odd-length palindromes, the center is a single character; for even-length palindromes, the center is two identical adjacent characters. There are 2n-1 possible centers to check in total.
  - You can also use dynamic programming: let dp[i][j] indicate whether s[i..j] is a palindrome. The recurrence is dp[i][j] = (s[i] == s[j]) && dp[i+1][j-1]. Track the start and end indices of the longest palindrome found.
