description: |
  You are given an integer array `nums`. You are initially positioned at the array's **first index**, and each element in the array represents your maximum jump length at that position.

  Return `true` if you can reach the last index, or `false` otherwise.

  **Example 1:**
  ```
  Input: nums = [2,3,1,1,4]
  Output: true
  Explanation: Jump 1 step from index 0 to index 1, then 3 steps to the last index.
  ```

  **Example 2:**
  ```
  Input: nums = [3,2,1,0,4]
  Output: false
  Explanation: You will always arrive at index 3 no matter what. Its maximum jump length is 0, which makes it impossible to reach the last index.
  ```

  **Constraints:**
  - `1 <= nums.length <= 10^4`
  - `0 <= nums[i] <= 10^5`

hints:
  - Greedy approach: maintain a variable `maxReach` representing the farthest index reachable so far. As you iterate, update `maxReach = max(maxReach, i + nums[i])`; if any index `i > maxReach`, that position cannot be reached.
  - Iterate left to right, checking at each step whether the current index is within reach (`i <= maxReach`). If not, return false immediately; if `maxReach >= n-1`, return true.
  - DP approach: `dp[i]` indicates whether index i is reachable. Start with `dp[0] = true`; for each reachable i, mark all positions up to `i + nums[i]` as true.

