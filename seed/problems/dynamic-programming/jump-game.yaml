    relevance: 0.9
  - name: Array
    relevance: 0.6
description: |
  给你一个非负整数数组 `nums`，你最初位于数组的**第一个下标**。数组中的每个元素代表你在该位置可以跳跃的最大长度。

  判断你是否能够到达最后一个下标，如果可以，返回 `true`；否则，返回 `false`。

  **示例 1：**
  ```
  输入：nums = [2,3,1,1,4]
  输出：true
  解释：可以先跳 1 步，从下标 0 到达下标 1, 然后再从下标 1 跳 3 步到达最后一个下标。
  ```

  **示例 2：**
  ```
  输入：nums = [3,2,1,0,4]
  输出：false
  解释：无论怎样，总会到达下标为 3 的位置。但该下标的最大跳跃长度是 0 ，所以永远不能到达最后一个下标。
  ```

  **约束条件：**
  - `1 <= nums.length <= 10^4`
  - `0 <= nums[i] <= 10^5`

hints:
  - 贪心方法：维护一个变量 `maxReach` 表示当前能到达的最远位置，遍历数组时不断更新 `maxReach = max(maxReach, i + nums[i])`，若任意位置 `i > maxReach` 则说明无法到达该位置。
  - 从左到右遍历，每次检查当前索引是否在可达范围内（`i <= maxReach`），若不在则直接返回 false；若 `maxReach >= n-1` 则返回 true。
  - DP 方法：`dp[i]` 表示能否到达索引 i，初始 `dp[0] = true`，对每个可达的 i，将 `dp[i+nums[i]]` 及其之间的所有位置标记为 true。

