  - name: Array
    relevance: 0.5
description: |
  给你一个整数数组 `nums`，找到其中最长严格递增子序列的长度。

  **子序列** 是由数组派生而来的序列，删除（或不删除）数组中的元素而不改变其余元素的顺序。例如，`[3,6,2,7]` 是数组 `[0,3,1,6,2,2,7]` 的子序列。

  **示例 1：**
  ```
  输入：nums = [10,9,2,5,3,7,101,18]
  输出：4
  解释：最长递增子序列是 [2,3,7,101]，因此长度为 4。
  ```

  **示例 2：**
  ```
  输入：nums = [0,1,0,3,2,3]
  输出：4
  ```

  **示例 3：**
  ```
  输入：nums = [7,7,7,7,7,7,7]
  输出：1
  ```

  **约束条件：**
  - `1 <= nums.length <= 2500`
  - `-10^4 <= nums[i] <= 10^4`

  **进阶：** 你能将算法的时间复杂度降低到 `O(n log n)` 吗？

hints:
  - 基础 DP：定义 `dp[i]` 为以 `nums[i]` 结尾的最长递增子序列长度，对每个 i，遍历所有 j < i，若 `nums[j] < nums[i]`，则 `dp[i] = max(dp[i], dp[j] + 1)`。
  - 进阶方法（O(n log n)）：维护一个 `tails` 数组，`tails[i]` 表示长度为 `i+1` 的最长递增子序列中末尾元素的最小值，遇到新元素时用二分搜索找到合适的位置替换。
  - 最终答案是 `tails` 数组的长度，而不是 `dp` 数组中的最大值。

