title: Combination Sum IV
slug: combination-sum
difficulty: MEDIUM
category: ALGORITHM
tags: [array, backtracking]
concepts:
  - name: Dynamic Programming
    relevance: 0.8
  - name: Array
    relevance: 0.7
  - name: Backtracking
    relevance: 0.9
description: |
  Given an array of **distinct** integers `candidates` and a target integer `target`, return a list of all **unique combinations** of `candidates` where the chosen numbers sum to `target`. You may return the combinations in **any order**.

  The **same** number may be chosen from `candidates` an **unlimited number of times**. Two combinations are unique if the frequency of at least one of the chosen numbers is different.

  The test cases are generated such that the number of unique combinations that sum up to `target` is less than `150` combinations for the given input.

  **Example 1:**
  ```
  Input: candidates = [2,3,6,7], target = 7
  Output: [[2,2,3],[7]]
  Explanation:
  2 and 3 can be combined to form 2 + 2 + 3 = 7. Note that 2 can be used multiple times.
  7 is also a candidate, 7 = 7.
  These are the only two combinations.
  ```

  **Example 2:**
  ```
  Input: candidates = [2,3,5], target = 8
  Output: [[2,2,2,2],[2,3,3],[3,5]]
  ```

  **Example 3:**
  ```
  Input: candidates = [2], target = 1
  Output: []
  ```

  **Constraints:**
  - `1 <= candidates.length <= 30`
  - `2 <= candidates[i] <= 40`
  - All elements of `candidates` are **distinct**
  - `1 <= target <= 40`

hints:
  - Use backtracking: starting from the first candidate, at each recursive step you can either choose the current candidate (allowing repeats) or skip it and move to the next.
  - Sorting `candidates` enables pruning: when the current candidate already exceeds the remaining target, all larger candidates can be skipped — break out of the loop early.
  - Maintain a `start` index so that each recursive call only considers candidates from `start` onward, preventing duplicate combinations (e.g., [2,3] and [3,2] represent the same combination).

