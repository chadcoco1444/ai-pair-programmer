title: Combination Sum IV
slug: combination-sum
difficulty: MEDIUM
category: ALGORITHM
tags: [array, backtracking]
concepts:
  - name: Dynamic Programming
    relevance: 0.8
  - name: Array
    relevance: 0.7
  - name: Backtracking
    relevance: 0.9
description: |
  给你一个由**不同**整数组成的数组 `candidates` 和一个目标整数 `target`，找出 `candidates` 中可以使数字和为目标数 `target` 的所有不同组合，并以列表形式返回。你可以按**任意顺序**返回这些组合。

  `candidates` 中的**同一个**数字可以**无限制重复被选取**。如果至少一个数字的被选数量不同，则两种组合是不同的。

  对于给定的输入，保证和为 `target` 的不同组合数少于 `150` 个。

  **示例 1：**
  ```
  输入：candidates = [2,3,6,7], target = 7
  输出：[[2,2,3],[7]]
  解释：
  2 和 3 可以形成一组候选，2 + 2 + 3 = 7 。注意 2 可以使用多次。
  7 也是一个候选， 7 = 7 。
  仅有这两种组合。
  ```

  **示例 2：**
  ```
  输入：candidates = [2,3,5], target = 8
  输出：[[2,2,2,2],[2,3,3],[3,5]]
  ```

  **示例 3：**
  ```
  输入：candidates = [2], target = 1
  输出：[]
  ```

  **约束条件：**
  - `1 <= candidates.length <= 30`
  - `2 <= candidates[i] <= 40`
  - `candidates` 中的所有元素**互不相同**
  - `1 <= target <= 40`

hints:
  - 使用回溯（Backtracking）：从第一个候选数开始，每次递归时可以选择当前候选数（允许重复选取）或跳过它继续下一个。
  - 对 `candidates` 排序可以实现剪枝优化：当当前候选数已经超过剩余目标值时，后面更大的数也不用再考虑了，可以直接退出循环。
  - 维护一个 `start` 索引，在每次递归中从 `start` 位置开始选取候选数，避免产生重复组合（如 [2,3] 和 [3,2] 是同一组合）。

