title: House Robber
slug: house-robber
difficulty: MEDIUM
category: ALGORITHM
tags: [dynamic-programming, array]
concepts:
  - name: Dynamic Programming
    relevance: 0.9
  - name: Array
    relevance: 0.6
description: |
  You are a professional robber planning to rob houses along a street. Each house has a certain amount of money stashed. The only constraint stopping you from robbing each of them is that adjacent houses have a security system connected, and **it will automatically contact the police if two adjacent houses were broken into on the same night**.

  Given an integer array `nums` representing the amount of money at each house, return the maximum amount of money you can rob tonight **without alerting the police**.

  **Example 1:**
  ```
  Input: nums = [1,2,3,1]
  Output: 4
  Explanation: Rob house 1 (money = 1) and then rob house 3 (money = 3).
               Total amount you can rob = 1 + 3 = 4.
  ```

  **Example 2:**
  ```
  Input: nums = [2,7,9,3,1]
  Output: 12
  Explanation: Rob house 1 (money = 2), rob house 3 (money = 9), then rob house 5 (money = 1).
               Total amount you can rob = 2 + 9 + 1 = 12.
  ```

  **Constraints:**
  - `1 <= nums.length <= 100`
  - `0 <= nums[i] <= 400`

hints:
  - "For each house you have two choices: rob it or skip it. If you rob the current house, you cannot rob the previous one; if you skip it, the previous one may or may not have been robbed."
  - "Define dp[i] as the maximum amount robbed from the first i houses. The transition is dp[i] = max(dp[i-1], dp[i-2] + nums[i])."
  - "Optimize space by using just two variables instead of an array: prev2 for dp[i-2] and prev1 for dp[i-1], updating them in a rolling fashion."

