title: House Robber
slug: house-robber
difficulty: MEDIUM
category: ALGORITHM
tags: [dynamic-programming, array]
concepts:
  - name: Dynamic Programming
    relevance: 0.9
  - name: Array
    relevance: 0.6
description: |
  你是一个专业的小偷，计划偷窃沿街的房屋。每间房内都藏有一定的现金，影响你偷窃的唯一制约因素就是相邻的房屋装有相互连通的防盗系统，**如果两间相邻的房屋在同一晚上被小偷闯入，系统会自动报警**。

  给定一个代表每个房屋存放金额的非负整数数组 `nums`，计算你**不触动警报装置的情况下**，一夜之内能够偷窃到的最高金额。

  **示例 1：**
  ```
  输入：nums = [1,2,3,1]
  输出：4
  解释：偷窃 1 号房屋（金额 = 1），然后偷窃 3 号房屋（金额 = 3）。
       偷窃到的最高金额 = 1 + 3 = 4。
  ```

  **示例 2：**
  ```
  输入：nums = [2,7,9,3,1]
  输出：12
  解释：偷窃 1 号房屋（金额 = 2），偷窃 3 号房屋（金额 = 9），接着偷窃 5 号房屋（金额 = 1）。
       偷窃到的最高金额 = 2 + 9 + 1 = 12。
  ```

  **约束条件：**
  - `1 <= nums.length <= 100`
  - `0 <= nums[i] <= 400`

hints:
  - 对每间房屋，你有两种选择：偷或不偷。若偷当前房屋，则不能偷前一间；若不偷，则前一间可偷可不偷。
  - 定义 `dp[i]` 为前 i 间房屋能偷到的最大金额，状态转移为 `dp[i] = max(dp[i-1], dp[i-2] + nums[i])`。
  - 可以只用两个变量代替数组来优化空间：`prev2` 表示 dp[i-2]，`prev1` 表示 dp[i-1]，滚动更新即可。

