title: Decode Ways
slug: decode-ways
difficulty: MEDIUM
category: ALGORITHM
tags: [dynamic-programming, string]
concepts:
  - name: Dynamic Programming
    relevance: 0.9
  - name: Array
    relevance: 0.3
description: |
  一条包含字母 `A-Z` 的消息通过以下映射进行了**编码**：
  ```
  'A' -> "1"
  'B' -> "2"
  ...
  'Z' -> "26"
  ```

  要**解码**已编码的消息，所有数字必须基于上述映射的方法，反转映射回字母（可能有多种方法）。例如，`"11106"` 可以映射为：
  - `"AAJF"` ，将消息分组为 `(1 1 10 6)`
  - `"KJF"` ，将消息分组为 `(11 10 6)`

  注意，消息不能分组为 `(1 11 06)`，因为 `"06"` 不能映射为 `"F"` ，这是由于 `"06"` 和 `"6"` 是不同的。

  给你一个只含数字的**非空**字符串 `s`，请计算并返回**解码**方法的**总数**。

  题目数据保证答案肯定是一个**32 位**的整数。

  **示例 1：**
  ```
  输入：s = "12"
  输出：2
  解释：它可以解码为 "AB"（1 2）或者 "L"（12）。
  ```

  **示例 2：**
  ```
  输入：s = "226"
  输出：3
  解释：它可以解码为 "BZ" (2 26), "VF" (22 6), 或者 "BBF" (2 2 6)。
  ```

  **示例 3：**
  ```
  输入：s = "06"
  输出：0
  解释："06" 无法映射到 "F" ，因为存在前导零（"6" 和 "06" 在映射中并不等价）。
  ```

  **约束条件：**
  - `1 <= s.length <= 100`
  - `s` 只包含数字，并且可能包含前导零。

hints:
  - 定义 `dp[i]` 为字符串 `s[0..i-1]` 的解码方法数，初始化 `dp[0] = 1`（空字符串有一种解码方式）。
  - 如果 `s[i-1]` 不是 '0'，则 `dp[i] += dp[i-1]`（当前字符单独解码）；如果 `s[i-2:i]` 是 "10" 到 "26" 之间的数，则 `dp[i] += dp[i-2]`（当前两个字符组合解码）。
  - 注意边界情况：若字符串以 '0' 开头或包含 "00" 则无解；'0' 只能与前一个 '1' 或 '2' 配对，不能单独使用。

