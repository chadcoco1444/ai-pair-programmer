title: Decode Ways
slug: decode-ways
difficulty: MEDIUM
category: ALGORITHM
tags: [dynamic-programming, string]
concepts:
  - name: Dynamic Programming
    relevance: 0.9
  - name: Array
    relevance: 0.3
description: |
  A message containing letters from `A-Z` can be **encoded** into numbers using the following mapping:
  ```
  'A' -> "1"
  'B' -> "2"
  ...
  'Z' -> "26"
  ```

  To **decode** an encoded message, all the digits must be grouped and then mapped back into letters using the reverse of the mapping above (there may be multiple ways). For example, `"11106"` can be mapped into:
  - `"AAJF"` with the grouping `(1 1 10 6)`
  - `"KJF"` with the grouping `(11 10 6)`

  Note that the grouping `(1 11 06)` is invalid because `"06"` cannot be mapped into `'F'` since `"06"` is different from `"6"`.

  Given a string `s` containing only digits, return the **number of ways** to **decode** it.

  The test cases are generated so that the answer fits in a **32-bit** integer.

  **Example 1:**
  ```
  Input: s = "12"
  Output: 2
  Explanation: "12" could be decoded as "AB" (1 2) or "L" (12).
  ```

  **Example 2:**
  ```
  Input: s = "226"
  Output: 3
  Explanation: "226" could be decoded as "BZ" (2 26), "VF" (22 6), or "BBF" (2 2 6).
  ```

  **Example 3:**
  ```
  Input: s = "06"
  Output: 0
  Explanation: "06" cannot be mapped to "F" because of the leading zero ("6" is different from "06").
  ```

  **Constraints:**
  - `1 <= s.length <= 100`
  - `s` contains only digits and may contain leading zeros.

hints:
  - Define `dp[i]` as the number of ways to decode `s[0..i-1]`. Initialize `dp[0] = 1` (an empty string has one way to be decoded).
  - If `s[i-1]` is not '0', then `dp[i] += dp[i-1]` (decode the current character alone). If `s[i-2:i]` forms a number between "10" and "26", then `dp[i] += dp[i-2]` (decode the last two characters together).
  - Watch out for edge cases: a string starting with '0' or containing "00" has no valid decoding; '0' can only be paired with a preceding '1' or '2', never decoded alone.

