description: |
  A robot is located at the top-left corner of a `m x n` grid (marked "Start" in the diagram).

  The robot can only move either down or right at any point in time. The robot is trying to reach the bottom-right corner of the grid (marked "Finish").

  How many possible unique paths are there?

  **Example 1:**
  ```
  Input: m = 3, n = 7
  Output: 28
  ```

  **Example 2:**
  ```
  Input: m = 3, n = 2
  Output: 3
  Explanation: From the top-left corner, there are a total of 3 ways to reach the bottom-right corner.
  1. Right -> Down -> Down
  2. Down -> Down -> Right
  3. Down -> Right -> Down
  ```

  **Example 3:**
  ```
  Input: m = 7, n = 3
  Output: 28
  ```

  **Example 4:**
  ```
  Input: m = 3, n = 3
  Output: 6
  ```

  **Constraints:**
  - `1 <= m, n <= 100`
  - The answer is guaranteed to be less than or equal to `2 * 10^9`.

hints:
  - Define `dp[i][j]` as the number of unique paths to reach cell (i, j). Since the robot can only move right or down, the transition is `dp[i][j] = dp[i-1][j] + dp[i][j-1]`.
  - Base case: all cells in the first row and first column have exactly 1 path (only one way to reach them).
  - Math approach: the robot needs exactly (m-1) + (n-1) total steps, with (m-1) steps down and (n-1) steps right. The answer is the combination C(m+n-2, m-1).

