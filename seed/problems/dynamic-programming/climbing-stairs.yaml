  - name: Dynamic Programming
    relevance: 0.9
  - name: Greedy
    relevance: 0.2
description: |
  You are climbing a staircase. It takes `n` steps to reach the top.

  Each time you can either climb `1` or `2` steps. In how many distinct ways can you climb to the top?

  **Example 1:**
  ```
  Input: n = 2
  Output: 2
  Explanation: There are two ways to climb to the top.
  1. 1 step + 1 step
  2. 2 steps
  ```

  **Example 2:**
  ```
  Input: n = 3
  Output: 3
  Explanation: There are three ways to climb to the top.
  1. 1 step + 1 step + 1 step
  2. 1 step + 2 steps
  3. 2 steps + 1 step
  ```

  **Constraints:**
  - `1 <= n <= 45`

hints:
  - Think about the recurrence relation: the number of ways to reach step n equals the number of ways to reach step n-1 plus the number of ways to reach step n-2, because you can arrive at step n from step n-1 with a 1-step jump, or from step n-2 with a 2-step jump.
  - This recurrence is exactly the Fibonacci sequence! The base cases are `dp[1] = 1` and `dp[2] = 2`; iterate from 3 onward.
  - You can optimize space by using just two variables instead of storing the entire dp array.

