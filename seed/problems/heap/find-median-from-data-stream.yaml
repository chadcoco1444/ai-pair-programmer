title: Find Median from Data Stream
slug: find-median-from-data-stream
difficulty: HARD
category: ALGORITHM
tags: [heap, design, sorting]
concepts:
  - name: Heap
    relevance: 1.0
  - name: Array
    relevance: 0.5
description: |
  The **median** is the middle value in an ordered list of integers. If the list size is even, there is no single middle value, and the median is the average of the two middle values.

  - For example, the median of `[2,3,4]` is `3`.
  - For example, the median of `[2,3]` is `(2 + 3) / 2 = 2.5`.

  Implement the `MedianFinder` class:

  - `MedianFinder()` Initializes the `MedianFinder` object.
  - `void addNum(int num)` Adds the integer `num` from the data stream to the data structure.
  - `double findMedian()` Returns the median of all elements so far. Answers within `10^-5` of the actual answer will be accepted.

  **Example 1:**
  ```
  Input:
  ["MedianFinder", "addNum", "addNum", "findMedian", "addNum", "findMedian"]
  [[], [1], [2], [], [3], []]
  Output:
  [null, null, null, 1.5, null, 2.0]

  Explanation:
  MedianFinder medianFinder = new MedianFinder();
  medianFinder.addNum(1);    // arr = [1]
  medianFinder.addNum(2);    // arr = [1, 2]
  medianFinder.findMedian(); // return 1.5 ((1 + 2) / 2)
  medianFinder.addNum(3);    // arr = [1, 2, 3]
  medianFinder.findMedian(); // return 2.0
  ```

  **Constraints:**
  - `-10^5 <= num <= 10^5`
  - There is at least one element in the data structure before calling `findMedian`
  - At most 5 * 10^4 calls total will be made to addNum and findMedian
hints:
  - Core idea: use two heaps to maintain the lower and upper halves of the data. A Max-Heap stores the smaller half of the numbers, and a Min-Heap stores the larger half.
  - Maintain the invariant: keep the size difference between the two heaps at most 1, and ensure the top of the Max-Heap is always less than or equal to the top of the Min-Heap.
  - Computing findMedian: if both heaps have equal size, the median is the average of the two heap tops; if one heap has one more element than the other, the median is the top of the larger heap.
