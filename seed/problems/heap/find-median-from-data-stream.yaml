title: Find Median from Data Stream
slug: find-median-from-data-stream
difficulty: HARD
category: ALGORITHM
tags: [heap, design, sorting]
concepts:
  - name: Heap
    relevance: 1.0
  - name: Array
    relevance: 0.5
description: |
  **中位數**是有序整數列表中的中間值。若列表大小為偶數，則沒有中間值，中位數是兩個中間值的平均數。

  - 例如 `[2,3,4]` 的中位數是 `3`。
  - 例如 `[2,3]` 的中位數是 `(2 + 3) / 2 = 2.5`。

  請實作 `MedianFinder` 類別：

  - `MedianFinder()` 初始化 `MedianFinder` 物件。
  - `void addNum(int num)` 將數字 `num` 從資料流加入資料結構中。
  - `double findMedian()` 回傳目前所有元素的中位數。實際答案與精確答案之間的誤差在 `10^-5` 以內的答案都將被接受。

  **範例 1：**
  ```
  輸入：
  ["MedianFinder", "addNum", "addNum", "findMedian", "addNum", "findMedian"]
  [[], [1], [2], [], [3], []]
  輸出：
  [null, null, null, 1.5, null, 2.0]

  解釋：
  MedianFinder medianFinder = new MedianFinder();
  medianFinder.addNum(1);    // arr = [1]
  medianFinder.addNum(2);    // arr = [1, 2]
  medianFinder.findMedian(); // 回傳 1.5（(1 + 2) / 2）
  medianFinder.addNum(3);    // arr = [1, 2, 3]
  medianFinder.findMedian(); // 回傳 2.0
  ```

  **限制條件：**
  - `-10^5 <= num <= 10^5`
  - 在呼叫 `findMedian` 之前，資料結構中至少有一個元素
  - 總共最多呼叫 5 * 10^4 次 addNum 和 findMedian
hints:
  - 核心思路：使用兩個堆維護資料的下半部分和上半部分。一個最大堆（Max-Heap）存放較小的那一半數字，一個最小堆（Min-Heap）存放較大的那一半數字。
  - 維護不變量：保持兩個堆的大小之差不超過 1，且最大堆的頂部始終小於等於最小堆的頂部。
  - findMedian 的計算：若兩堆大小相等，中位數為兩個堆頂的平均值；若一堆比另一堆多一個元素，中位數就是元素較多的那個堆的堆頂。
