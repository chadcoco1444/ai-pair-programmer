description: |
  Given an integer array `nums` and an integer `k`, return the `k` most frequent elements. You may return the answer in **any order**.

  **Example 1:**
  ```
  Input: nums = [1,1,1,2,2,3], k = 2
  Output: [1,2]
  Explanation: Element 1 appears 3 times, element 2 appears 2 times, element 3 appears 1 time. The top 2 most frequent elements are 1 and 2.
  ```

  **Example 2:**
  ```
  Input: nums = [1], k = 1
  Output: [1]
  ```

  **Constraints:**
  - `1 <= nums.length <= 10^5`
  - `-10^4 <= nums[i] <= 10^4`
  - `k` is in the range `[1, the number of unique elements in the array]`
  - It is guaranteed that the answer is unique — in other words, the set of the top k frequent elements is unique

  **Follow-up:** Your algorithm's time complexity must be better than O(n log n).
hints:
  - Step 1: use a Hash Table to count the frequency of each element, with time complexity O(n).
  - Step 2: use a **Min-Heap of size k** to maintain the k most frequent elements. Iterate through the Hash Table — if the heap size is less than k, add directly; if the heap is full and the current element's frequency is greater than the heap top (minimum frequency), pop the top and add the current element. At the end, the heap contains the answer.
  - An alternative O(n) method is **Bucket Sort**: create a bucket array of length n+1, where the index represents frequency. Place each element into the bucket matching its frequency, then collect elements from high-frequency to low-frequency buckets until k elements are gathered.
