  - name: Linked List
    relevance: 1.0
  - name: Two Pointer
    relevance: 0.9
description: |
  Given the head node `head` of a linked list and an integer `n`, remove the **nth node from the end** of the list and return the head of the modified list.

  **Example 1:**
  ```
  Input: head = [1,2,3,4,5], n = 2
  Output: [1,2,3,5]
  Explanation: Remove the 2nd node from the end (value 4).
  ```

  **Example 2:**
  ```
  Input: head = [1], n = 1
  Output: []
  ```

  **Example 3:**
  ```
  Input: head = [1,2], n = 1
  Output: [1]
  ```

  **Constraints:**
  - The number of nodes in the list is `sz`
  - `1 <= sz <= 30`
  - `0 <= Node.val <= 100`
  - `1 <= n <= sz`

  **Follow-up:** Can you solve this in one pass?
hints:
  - Two-pass approach: in the first pass, compute the total length `L` of the list. In the second pass, find the `L - n`th node (the node just before the one to delete) and update its `next` pointer to skip the target node.
  - One-pass approach (two pointers): use a fast and slow pointer. Advance the fast pointer `n` steps first, then move both pointers forward together until the fast pointer reaches the last node. At that point, the slow pointer is at the (n+1)th node from the end.
  - Using a Dummy Node elegantly handles the edge case where the head itself needs to be deleted (e.g., `n == sz`), avoiding a special check.
