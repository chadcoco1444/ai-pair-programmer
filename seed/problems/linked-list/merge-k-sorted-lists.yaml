description: |
  Given an array `lists` of `k` sorted linked lists, merge all the lists into one sorted linked list and return it.

  **Example 1:**
  ```
  Input: lists = [[1,4,5],[1,3,4],[2,6]]
  Output: [1,1,2,3,4,4,5,6]
  Explanation: The three linked lists are:
  1->4->5
  1->3->4
  2->6
  Merging them gives: 1->1->2->3->4->4->5->6
  ```

  **Example 2:**
  ```
  Input: lists = []
  Output: []
  ```

  **Example 3:**
  ```
  Input: lists = [[]]
  Output: []
  ```

  **Constraints:**
  - `k == lists.length`
  - `0 <= k <= 10^4`
  - `0 <= lists[i].length <= 500`
  - `-10^4 <= lists[i][j] <= 10^4`
  - `lists[i]` is sorted in ascending order
  - The total number of nodes across all lists does not exceed `10^4`
hints:
  - The brute-force approach collects all node values into an array, sorts it, and rebuilds the list. Time complexity is O(N log N). However, you can do better by leveraging the fact that the lists are already sorted.
  - Min Heap approach: maintain a min heap of size k. Each time, extract the node with the minimum value, then push its next node back into the heap. Time complexity is O(N log k).
  - Divide and Conquer: merge lists in pairs — each round reduces k lists to k/2. After log k rounds, with N total nodes per round, the overall time complexity is O(N log k) without needing extra heap space.
