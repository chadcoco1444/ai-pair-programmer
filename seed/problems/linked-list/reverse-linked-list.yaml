  - name: Linked List
    relevance: 1.0
description: |
  Given the head node `head` of a singly linked list, reverse the list and return the reversed list's head node.

  **Example 1:**
  ```
  Input: head = [1,2,3,4,5]
  Output: [5,4,3,2,1]
  ```

  **Example 2:**
  ```
  Input: head = [1,2]
  Output: [2,1]
  ```

  **Example 3:**
  ```
  Input: head = []
  Output: []
  ```

  **Constraints:**
  - The number of nodes in the list is in the range `[0, 5000]`
  - `-5000 <= Node.val <= 5000`

  **Follow-up:** Can you implement it both iteratively and recursively?
hints:
  - Iterative approach: use three pointers `prev`, `curr`, and `next`. At each step, point `curr.next` to `prev`, then advance all three pointers forward, until `curr` is null.
  - Recursive approach: recursively reverse the remainder of the list (excluding the head), obtain the new head, then make the original head's next node point back to the head, and set the head's `next` to null.
  - Watch for edge cases: if the list is empty (`head == null`) or has only one node, return `head` immediately without any modification.
