title: Merge Two Sorted Lists
slug: merge-two-sorted-lists
difficulty: EASY
category: ALGORITHM
tags: [linked-list, recursion]
concepts:
  - name: Linked List
    relevance: 1.0
description: |
  Given the head nodes of two sorted linked lists `list1` and `list2`, merge the two lists into one sorted linked list and return it.

  The merged linked list should be made by splicing together the nodes of the two input lists.

  **Example 1:**
  ```
  Input: list1 = [1,2,4], list2 = [1,3,4]
  Output: [1,1,2,3,4,4]
  ```

  **Example 2:**
  ```
  Input: list1 = [], list2 = []
  Output: []
  ```

  **Example 3:**
  ```
  Input: list1 = [], list2 = [0]
  Output: [0]
  ```

  **Constraints:**
  - The number of nodes in both lists is in the range `[0, 50]`
  - `-100 <= Node.val <= 100`
  - Both `list1` and `list2` are sorted in non-decreasing order
hints:
  - Use a Dummy Node technique: create a `dummy` node as the starting point of the merged list, and maintain a `curr` pointer tracking the current tail. This avoids special-casing the head node.
  - Compare the current node values of both lists; attach the smaller node to `curr.next`, then advance the corresponding list pointer and the `curr` pointer. Repeat until one list is empty.
  - Recursive approach: if `list1.val <= list2.val`, set `list1.next = merge(list1.next, list2)` and return `list1`; otherwise handle symmetrically. Base case: return the non-null list when one list is empty.
