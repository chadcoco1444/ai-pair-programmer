description: |
  Given a singly linked list `L` in the form: L0 → L1 → … → Ln-1 → Ln

  Reorder it to: L0 → Ln → L1 → Ln-1 → L2 → Ln-2 → …

  You may not modify the values in the list's nodes. Only node pointers may be changed. The modification must be done **in-place**.

  **Example 1:**
  ```
  Input: head = [1,2,3,4]
  Output: [1,4,2,3]
  ```

  **Example 2:**
  ```
  Input: head = [1,2,3,4,5]
  Output: [1,5,2,4,3]
  ```

  **Constraints:**
  - The number of nodes in the list is in the range `[1, 5 * 10^4]`
  - `1 <= Node.val <= 1000`
hints:
  - This problem can be broken into three steps: (1) find the middle node of the linked list; (2) reverse the second half; (3) interleave the first half with the reversed second half.
  - To find the middle node, use a slow and fast pointer: the slow pointer moves one step at a time, the fast pointer moves two steps. When the fast pointer reaches the end, the slow pointer is at the middle. Then split the list into two halves at the middle node.
  - After reversing the second half, use two pointers starting from the heads of each half. Alternately insert nodes from the second half into the first half. Remember to save `next` pointers before each operation to avoid losing references.
