description: |
  Given the head node `head` of a linked list, determine whether the linked list contains a cycle.

  A cycle exists in a linked list if some node can be reached again by continuously following the `next` pointer.

  **Example 1:**
  ```
  Input: head = [3,2,0,-4], pos = 1
  Output: true
  Explanation: There is a cycle in the linked list, where the tail connects to the node at index 1.
  ```

  **Example 2:**
  ```
  Input: head = [1,2], pos = 0
  Output: true
  Explanation: There is a cycle in the linked list, where the tail connects to the node at index 0.
  ```

  **Example 3:**
  ```
  Input: head = [1], pos = -1
  Output: false
  Explanation: There is no cycle in the linked list.
  ```

  **Constraints:**
  - The number of nodes in the list is in the range `[0, 10^4]`
  - `-10^5 <= Node.val <= 10^5`
  - `pos` is `-1` or a valid index in the linked list

  **Follow-up:** Can you solve it using O(1) memory?
hints:
  - The most straightforward approach is to use a Hash Set to record all visited nodes. If a node is encountered again, there is a cycle. However, this requires O(n) extra space.
  - The advanced approach uses Floyd's Cycle Detection (tortoise and hare) algorithm: set a slow pointer (moves one step at a time) and a fast pointer (moves two steps at a time). If a cycle exists, the two pointers will eventually meet.
  - If the fast pointer reaches null or the fast pointer's next is null, the linked list has no cycle — return false.
