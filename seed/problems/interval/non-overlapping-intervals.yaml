description: |
  Given an array of intervals `intervals` where `intervals[i] = [starti, endi]`, return the **minimum number of intervals you need to remove** to make the rest of the intervals non-overlapping.

  **Note:** Intervals which only touch at a point (e.g. `[1,2]` and `[2,3]`) are **non-overlapping**.

  **Example 1:**
  ```
  Input: intervals = [[1,2],[2,3],[3,4],[1,3]]
  Output: 1
  Explanation: [1,3] can be removed and the rest of the intervals are non-overlapping.
  ```

  **Example 2:**
  ```
  Input: intervals = [[1,2],[1,2],[1,2]]
  Output: 2
  Explanation: You need to remove two [1,2] to make the rest of the intervals non-overlapping.
  ```

  **Example 3:**
  ```
  Input: intervals = [[1,2],[2,3]]
  Output: 0
  Explanation: You don't need to remove any of the intervals since they're already non-overlapping.
  ```

  **Constraints:**
  - `1 <= intervals.length <= 10^5`
  - `intervals[i].length == 2`
  - `-5 * 10^4 <= starti < endi <= 5 * 10^4`
hints:
  - Equivalent transformation: "minimum removals" = total intervals - **maximum number of non-overlapping intervals you can keep**. The problem reduces to finding the maximum number of non-overlapping intervals.
  - Use a **greedy strategy**: sort intervals by their **end time** in ascending order. Always pick the interval that ends earliest, leaving the most room for subsequent intervals. Select an interval if its start time is **greater than or equal to** the end time of the last selected interval.
  - After sorting, maintain an `end` variable (initially negative infinity). Iterate over each interval: if `start >= end`, keep the interval and update `end` to the current end value; otherwise skip it (i.e., remove it) and increment the count.
