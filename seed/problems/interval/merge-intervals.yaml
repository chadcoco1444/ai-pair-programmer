title: Merge Intervals
slug: merge-intervals
difficulty: MEDIUM
category: ALGORITHM
tags: [array, interval, sorting]
concepts:
  - name: Array
    relevance: 0.8
  - name: Sorting
    relevance: 1.0
description: |
  Given an array of `intervals` where `intervals[i] = [starti, endi]`, merge all overlapping intervals, and return an array of the non-overlapping intervals that cover all the intervals in the input.

  **Example 1:**
  ```
  Input: intervals = [[1,3],[2,6],[8,10],[15,18]]
  Output: [[1,6],[8,10],[15,18]]
  Explanation: Since intervals [1,3] and [2,6] overlap, merge them into [1,6].
  ```

  **Example 2:**
  ```
  Input: intervals = [[1,4],[4,5]]
  Output: [[1,5]]
  Explanation: Intervals [1,4] and [4,5] are considered overlapping (they touch at endpoint 4), so merge them into [1,5].
  ```

  **Example 3:**
  ```
  Input: intervals = [[1,4],[0,4]]
  Output: [[0,4]]
  ```

  **Constraints:**
  - `1 <= intervals.length <= 10^4`
  - `intervals[i].length == 2`
  - `0 <= starti <= endi <= 10^4`
hints:
  - Key first step: sort the intervals by their **start value**. After sorting, overlapping intervals will be adjacent, making them easy to merge one by one.
  - Maintain a result list and add the first interval to it. For each subsequent interval, if its start value is **less than or equal to** the end value of the last interval in the result, they overlap — update the last interval's end to the maximum of the two ends. Otherwise, append the new interval to the result.
  - Time complexity is O(n log n) (sorting); space complexity is O(n) (storing the result).
