title: Merge Intervals
slug: merge-intervals
difficulty: MEDIUM
category: ALGORITHM
tags: [array, interval, sorting]
concepts:
  - name: Array
    relevance: 0.8
  - name: Sorting
    relevance: 1.0
description: |
  給定一個區間陣列 `intervals`，其中 `intervals[i] = [starti, endi]`，請合併所有**重疊的區間**，並回傳一個不重疊的區間陣列，覆蓋所有輸入中的區間。

  **範例 1：**
  ```
  輸入：intervals = [[1,3],[2,6],[8,10],[15,18]]
  輸出：[[1,6],[8,10],[15,18]]
  解釋：[1,3] 和 [2,6] 重疊，合併為 [1,6]。
  ```

  **範例 2：**
  ```
  輸入：intervals = [[1,4],[4,5]]
  輸出：[[1,5]]
  解釋：[1,4] 和 [4,5] 在端點 4 處相觸，也視為重疊，合併為 [1,5]。
  ```

  **範例 3：**
  ```
  輸入：intervals = [[1,4],[0,4]]
  輸出：[[0,4]]
  ```

  **限制條件：**
  - `1 <= intervals.length <= 10^4`
  - `intervals[i].length == 2`
  - `0 <= starti <= endi <= 10^4`
hints:
  - 關鍵前置步驟：先按照每個區間的**起始值**進行排序。排序後，重疊的區間必定相鄰，便於逐一合併。
  - 維護一個結果列表，將第一個區間加入。對於每個後續區間，若其起始值**小於等於**結果列表最後一個區間的結束值，則它們重疊，更新最後一個區間的結束值為兩者的最大值；否則直接將新區間加入結果列表。
  - 時間複雜度為 O(n log n)（排序），空間複雜度為 O(n)（儲存結果）。
