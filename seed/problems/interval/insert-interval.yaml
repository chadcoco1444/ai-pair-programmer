title: Insert Interval
slug: insert-interval
difficulty: MEDIUM
category: ALGORITHM
tags: [array, interval]
concepts:
  - name: Array
    relevance: 1.0
  - name: Interval
    relevance: 0.9
description: |
  You are given an array of non-overlapping intervals `intervals` where `intervals[i] = [starti, endi]` represents the start and end of the `i`th interval, and `intervals` is sorted in ascending order by `starti`. You are also given an interval `newInterval = [start, end]` that represents the start and end of another interval.

  Insert `newInterval` into `intervals` such that `intervals` is still sorted in ascending order by `starti` and `intervals` still does not have any overlapping intervals (merge overlapping intervals if necessary).

  Return `intervals` after the insertion.

  **Example 1:**
  ```
  Input: intervals = [[1,3],[6,9]], newInterval = [2,5]
  Output: [[1,5],[6,9]]
  Explanation: The new interval [2,5] overlaps with [1,3], so they are merged into [1,5].
  ```

  **Example 2:**
  ```
  Input: intervals = [[1,2],[3,5],[6,7],[8,10],[12,16]], newInterval = [4,8]
  Output: [[1,2],[3,10],[12,16]]
  Explanation: The new interval [4,8] overlaps with [3,5],[6,7],[8,10], merging them into [3,10].
  ```

  **Example 3:**
  ```
  Input: intervals = [], newInterval = [5,7]
  Output: [[5,7]]
  ```

  **Constraints:**
  - `0 <= intervals.length <= 10^4`
  - `intervals[i].length == 2`
  - `0 <= starti <= endi <= 10^5`
  - `intervals` is sorted by `starti` in ascending order with no overlapping intervals
  - `newInterval.length == 2`
  - `0 <= start <= end <= 10^5`
hints:
  - Split the problem into three parts: (1) all intervals strictly to the left of `newInterval` (no overlap) are added to the result as-is; (2) all intervals that overlap with `newInterval` are merged into it one by one; (3) all remaining intervals to the right are added as-is.
  - Two intervals `[a,b]` and `[c,d]` overlap if and only if `a <= d` and `c <= b`. The merged interval is `[min(a,c), max(b,d)]`.
  - A single linear pass suffices, giving O(n) time complexity. You can also use binary search to find the insertion point for a small constant-factor improvement.
