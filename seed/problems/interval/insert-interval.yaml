title: Insert Interval
slug: insert-interval
difficulty: MEDIUM
category: ALGORITHM
tags: [array, interval]
concepts:
  - name: Array
    relevance: 1.0
description: |
  給定一個**已排序且不重疊**的區間列表 `intervals`，其中 `intervals[i] = [starti, endi]`，以及一個新的區間 `newInterval = [start, end]`。

  請將 `newInterval` 插入 `intervals` 中，並在必要時合併重疊的區間，確保回傳的區間列表仍然**有序且不重疊**。

  **範例 1：**
  ```
  輸入：intervals = [[1,3],[6,9]], newInterval = [2,5]
  輸出：[[1,5],[6,9]]
  解釋：新區間 [2,5] 與 [1,3] 重疊，合併後得到 [1,5]。
  ```

  **範例 2：**
  ```
  輸入：intervals = [[1,2],[3,5],[6,7],[8,10],[12,16]], newInterval = [4,8]
  輸出：[[1,2],[3,10],[12,16]]
  解釋：新區間 [4,8] 與 [3,5],[6,7],[8,10] 重疊，合併後得到 [3,10]。
  ```

  **範例 3：**
  ```
  輸入：intervals = [], newInterval = [5,7]
  輸出：[[5,7]]
  ```

  **限制條件：**
  - `0 <= intervals.length <= 10^4`
  - `intervals[i].length == 2`
  - `0 <= starti <= endi <= 10^5`
  - `intervals` 已按 `starti` 升序排序且互不重疊
  - `newInterval.length == 2`
  - `0 <= start <= end <= 10^5`
hints:
  - 將問題分為三個部分處理：① 所有在 `newInterval` 左側且不重疊的區間直接加入結果；② 所有與 `newInterval` 重疊的區間逐一與其合併；③ 剩下在右側不重疊的區間直接加入結果。
  - 判斷重疊的條件：區間 `[a,b]` 和 `[c,d]` 重疊，當且僅當 `a <= d` 且 `c <= b`。合併後的區間為 `[min(a,c), max(b,d)]`。
  - 線性遍歷一次即可完成，時間複雜度 O(n)。也可以用二分搜尋找到插入位置，進一步優化常數。
