# Knowledge graph seed data — covers all Blind 75 categories
# Each concept has: name, domain, description
# Edges are defined in the `edges` section

concepts:
  # ===== Algorithmic techniques =====
  - name: Array
    domain: ALGORITHM
    description: Arrays are the most fundamental data structure, supporting random access. Mastering array operations is the foundation for all algorithms.

  - name: Two Pointer
    domain: ALGORITHM
    description: The two-pointer technique uses two pointers traversing an array from different directions, commonly used for search problems on sorted arrays.

  - name: Sliding Window
    domain: ALGORITHM
    description: The sliding window technique maintains a dynamically sized window sliding over an array, applicable to subarray/substring problems.

  - name: Binary Search
    domain: ALGORITHM
    description: Binary search locates a target in sorted data in O(log n) time. It can be extended to searching over an answer space.

  - name: Sorting
    domain: ALGORITHM
    description: Sorting algorithms, including comparison sorts (quicksort, mergesort) and non-comparison sorts (counting sort, radix sort).

  - name: Divide and Conquer
    domain: ALGORITHM
    description: Divide-and-conquer breaks a problem into subproblems, solves them recursively, and combines the results. Mergesort and quicksort are classic examples.

  - name: Greedy
    domain: ALGORITHM
    description: Greedy algorithms pick the locally optimal choice at each step. You must prove that local optima lead to a global optimum.

  - name: Dynamic Programming
    domain: ALGORITHM
    description: Dynamic programming avoids redundant computation by memoizing subproblem solutions. It applies to problems with optimal substructure and overlapping subproblems.

  - name: Backtracking
    domain: ALGORITHM
    description: Backtracking systematically searches all possible solutions, undoing choices when they prove infeasible. Common for permutations, combinations, and board problems.

  - name: Bit Manipulation
    domain: ALGORITHM
    description: Bit manipulation uses AND, OR, XOR, and shifts to efficiently handle integer problems. Useful for addition without arithmetic operators, finding missing numbers, and more.

  - name: Interval
    domain: ALGORITHM
    description: Interval problems involve overlapping, merging, or inserting intervals. A common technique is to sort first, then sweep.

  - name: Union Find
    domain: ALGORITHM
    description: Union-find (disjoint-set) efficiently supports merge and query operations over disjoint sets. Common in graph connectivity problems.

  - name: Topological Sort
    domain: ALGORITHM
    description: Topological sort produces a linear ordering of the vertices of a directed acyclic graph (DAG). Common for task scheduling and course prerequisites.

  # ===== Data structures =====
  - name: Hash Table
    domain: DATA_STRUCTURE
    description: Hash tables provide average O(1) insert, delete, and lookup. Understanding hash functions and collision handling is key.

  - name: Stack
    domain: DATA_STRUCTURE
    description: Stacks are last-in, first-out (LIFO). Common uses include bracket matching, expression evaluation, and iterative DFS.

  - name: Monotonic Stack
    domain: DATA_STRUCTURE
    description: A monotonic stack maintains a strictly increasing or decreasing stack. Used to find the next greater/smaller element for each item.

  - name: Queue
    domain: DATA_STRUCTURE
    description: Queues are first-in, first-out (FIFO). The foundational data structure for BFS.

  - name: Linked List
    domain: DATA_STRUCTURE
    description: Linked lists are dynamically sized linear data structures. Understanding pointer manipulation is fundamental to systems programming.

  - name: Tree
    domain: DATA_STRUCTURE
    description: A tree is a hierarchical data structure. Binary trees, BSTs, and AVL trees are common variants. DFS and BFS are foundational traversals.

  - name: Graph
    domain: DATA_STRUCTURE
    description: Graphs consist of nodes and edges. BFS and DFS are foundational traversal algorithms; topological sort and shortest paths are advanced applications.

  - name: Heap
    domain: DATA_STRUCTURE
    description: A heap (priority queue) supports O(log n) insert and extract-max/min. Useful for Top-K problems and scheduling.

  - name: Trie
    domain: DATA_STRUCTURE
    description: A trie (prefix tree) efficiently stores and searches sets of strings. It supports prefix queries and autocomplete.

  - name: Matrix
    domain: DATA_STRUCTURE
    description: Two-dimensional matrices represent grids, images, or maps. Common operations include rotation, spiral traversal, and pathfinding.

  # ===== System design =====
  - name: CAP Theorem
    domain: SYSTEM_DESIGN
    description: The CAP theorem states that a distributed system can simultaneously guarantee at most two of consistency, availability, and partition tolerance.

  - name: Load Balancing
    domain: SYSTEM_DESIGN
    description: Load balancing distributes requests across multiple servers. Common strategies include round robin, least connections, and consistent hashing.

  - name: Caching
    domain: SYSTEM_DESIGN
    description: Caching stores frequently used data in memory to reduce latency. You must consider eviction policies (LRU, LFU, TTL).

  - name: Rate Limiting
    domain: SYSTEM_DESIGN
    description: Rate limiting protects a system from excessive requests. Common algorithms include token bucket, leaky bucket, fixed window, and sliding window.

  # ===== Systems programming =====
  - name: Memory Management
    domain: MEMORY_MANAGEMENT
    description: Memory management covers dynamic allocation (malloc/free), alignment, and memory pools.

  - name: Thread Synchronization
    domain: CONCURRENCY
    description: Thread synchronization uses mutexes, semaphores, and condition variables to coordinate access across multiple threads.

  - name: Lock-free Programming
    domain: CONCURRENCY
    description: Lock-free programming uses atomic operations (CAS) to build concurrent data structures without locks.

  - name: Process Communication
    domain: OS_KERNEL
    description: Inter-process communication (IPC) covers pipes, shared memory, message queues, and signals.

