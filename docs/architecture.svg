<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b1f4a"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#422006"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">SKILL Platform Architecture</text>
  <text x="400" y="54" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Docker Compose</text>

  <!-- Outer border -->
  <rect x="20" y="64" width="760" height="440" rx="10" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 3" fill="none"/>

  <!-- ===== Next.js App (main card) ===== -->
  <rect x="40" y="80" width="720" height="180" rx="8" fill="url(#card1)" filter="url(#shadow)"/>
  <rect x="40" y="80" width="720" height="180" rx="8" stroke="#3b82f6" stroke-width="1"/>

  <!-- Title bar -->
  <text x="60" y="104" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Next.js 15 Full-Stack App</text>
  <text x="680" y="104" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">:3001</text>

  <!-- Sub-boxes inside Next.js -->
  <!-- React UI -->
  <rect x="60" y="116" width="145" height="56" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="132" y="140" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">React UI</text>
  <text x="132" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Chat + Monaco Editor</text>

  <!-- tRPC API -->
  <rect x="218" y="116" width="145" height="56" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="290" y="140" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">tRPC API</text>
  <text x="290" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Type-safe endpoints</text>

  <!-- SKILL AI -->
  <rect x="376" y="116" width="145" height="56" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="448" y="140" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SKILL AI Engine</text>
  <text x="448" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Gemini + 5-Phase FSM</text>

  <!-- Adaptive Learning -->
  <rect x="534" y="116" width="210" height="56" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="639" y="140" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Adaptive Learning Engine</text>
  <text x="639" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">Knowledge Graph + Recommender</text>

  <!-- Service layer -->
  <rect x="60" y="184" width="684" height="32" rx="6" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="402" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">ProblemService  |  KnowledgeGraphService  |  SKILLOrchestrator  |  AdaptiveLearningEngine  |  ExecutionClient</text>

  <!-- Prisma -->
  <rect x="60" y="226" width="100" height="24" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="110" y="242" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Prisma ORM</text>

  <!-- NextAuth -->
  <rect x="172" y="226" width="100" height="24" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="222" y="242" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10" font-weight="600">NextAuth.js</text>

  <!-- Arrow from Next.js to Executor -->
  <line x1="400" y1="260" x2="400" y2="290" stroke="#475569" stroke-width="1.5"/>
  <polygon points="394,286 400,296 406,286" fill="#475569"/>
  <text x="420" y="280" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">HTTP</text>

  <!-- ===== Executor ===== -->
  <rect x="140" y="296" width="520" height="80" rx="8" fill="url(#card2)" filter="url(#shadow)"/>
  <rect x="140" y="296" width="520" height="80" rx="8" stroke="#22c55e" stroke-width="1"/>

  <text x="160" y="320" fill="#86efac" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Sandbox Execution Engine</text>
  <text x="580" y="320" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">:4000</text>

  <!-- Runner boxes -->
  <rect x="160" y="332" width="100" height="32" rx="4" fill="#0f2618" stroke="#4ade80" stroke-width="0.6"/>
  <text x="210" y="352" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10">Python 3.12</text>

  <rect x="272" y="332" width="100" height="32" rx="4" fill="#0f2618" stroke="#4ade80" stroke-width="0.6"/>
  <text x="322" y="352" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10">C / C++</text>

  <rect x="384" y="332" width="100" height="32" rx="4" fill="#0f2618" stroke="#4ade80" stroke-width="0.6"/>
  <text x="434" y="352" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10">JavaScript</text>

  <rect x="496" y="332" width="148" height="32" rx="4" fill="#0f2618" stroke="#4ade80" stroke-width="0.6"/>
  <text x="570" y="352" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10">BullMQ Worker</text>

  <!-- ===== Database boxes ===== -->
  <!-- PostgreSQL -->
  <rect x="40" y="410" width="230" height="76" rx="8" fill="url(#card3)" filter="url(#shadow)"/>
  <rect x="40" y="410" width="230" height="76" rx="8" stroke="#a855f7" stroke-width="1"/>
  <text x="155" y="438" text-anchor="middle" fill="#d8b4fe" font-family="system-ui, sans-serif" font-size="13" font-weight="700">PostgreSQL 16</text>
  <text x="155" y="456" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">16 models, 9 enums</text>
  <text x="155" y="472" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">:5433</text>

  <!-- Redis -->
  <rect x="290" y="410" width="220" height="76" rx="8" fill="url(#card4)" filter="url(#shadow)"/>
  <rect x="290" y="410" width="220" height="76" rx="8" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Redis 7</text>
  <text x="400" y="456" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Session + Job Queue</text>
  <text x="400" y="472" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">:6379</text>

  <!-- Gemini API (external) -->
  <rect x="530" y="410" width="230" height="76" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <rect x="530" y="410" width="230" height="76" rx="8" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="645" y="438" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Google Gemini AI</text>
  <text x="645" y="456" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">2.0 Flash (Free)</text>
  <text x="645" y="472" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">External API</text>

  <!-- Connecting lines -->
  <!-- Next.js to PostgreSQL -->
  <line x1="155" y1="260" x2="155" y2="410" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Next.js to Redis -->
  <line x1="300" y1="260" x2="400" y2="410" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Executor to Redis -->
  <line x1="500" y1="376" x2="450" y2="410" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Next.js to Gemini -->
  <line x1="645" y1="260" x2="645" y2="410" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
</svg>
