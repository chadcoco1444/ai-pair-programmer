      <text x="12" y="42" fill="#94a3b8">1. Point at 2. What sums to 9?</text>
      <text x="12" y="58" fill="#94a3b8">2. How would you remember seen nums?</text>
      <text x="12" y="74" fill="#94a3b8">3. If you reach 15 with no match...?</text>
